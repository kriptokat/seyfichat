<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SEYFİÇET - Telefonla P2P Mesajlaşma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 85vh;
            max-height: 750px;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
        }

        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 1.8rem;
        }
        .header-text h2 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header-buttons {
            display: flex;
            gap: 12px;
        }
        .header-icon-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .header-icon-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(0.98);
        }

        .chat-header {
            background: #4a90e2;
            color: white;
            padding: 8px 16px;
            text-align: center;
            flex-shrink: 0;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .current-chat-info {
            padding: 8px 16px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
            border-bottom: 1px solid #eef2f6;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .chat-name-with-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .current-chat-name { 
            color: #1e293b; 
            font-weight: 700; 
            font-size: 0.9rem;
        }
        .online-status-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 4px currentColor;
        }
        .online-status-led.online {
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e;
        }
        .online-status-led.offline {
            background: #ef4444;
            box-shadow: 0 0 4px #ef4444;
        }
        .online-status-led.connecting {
            background: #eab308;
            animation: pulse 1s infinite;
        }
        .typing-indicator {
            font-size: 0.65rem;
            color: #4a90e2;
            padding: 4px 12px;
            font-style: italic;
            background: #eef2ff;
            border-radius: 20px;
            display: inline-block;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message { display: flex; flex-direction: column; max-width: 85%; }
        .message.sent { align-self: flex-end; align-items: flex-end; }
        .message.received { align-self: flex-start; align-items: flex-start; }

        .message-content {
            padding: 10px 14px;
            border-radius: 22px;
            word-wrap: break-word;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .sent .message-content { background: #4a90e2; color: white; border-bottom-right-radius: 5px; }
        .received .message-content { background: white; color: #1e293b; border: 0.5px solid #e2e8f0; border-bottom-left-radius: 5px; }

        .read-status {
            font-size: 0.55rem;
            margin-top: 4px;
            margin-right: 6px;
            color: #64748b;
        }
        .sent .read-status { color: #cbd5e1; }
        .read-status.read { color: #22c55e; }

        .input-container {
            flex-shrink: 0;
            background: white;
            border-top: 1px solid #edf2f7;
            padding: 12px 16px;
        }
        .message-input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 32px;
            outline: none;
            font-size: 0.9rem;
        }
        #messageInput:focus { border-color: #4a90e2; }
        #sendButton {
            padding: 12px 24px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 32px;
            font-weight: 600;
            cursor: pointer;
        }
        #sendButton:disabled { opacity: 0.5; cursor: not-allowed; }

        /* AYARLAR MODALI */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white;
            width: 85%;
            max-width: 360px;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.3);
        }
        .modal-content h3 { margin-bottom: 16px; font-size: 1.3rem; display: flex; align-items: center; gap: 8px; }
        .modal-content input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 1px solid #cbd5e1;
            border-radius: 28px;
            font-size: 0.9rem;
        }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-save { background: #4a90e2; color: white; flex: 1; padding: 10px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; }
        .modal-cancel { background: #e2e8f0; color: #334155; flex: 1; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; }
        
        /* KİŞİLERİM AÇILIR KUTU (Dropdown) - Modern, numaralandırmalı */
        .contacts-dropdown-wrapper {
            position: relative;
            margin: 0;
        }
        .contacts-trigger-btn {
            width: 100%;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e293b;
            transition: all 0.2s;
            margin-bottom: 8px;
        }
        .contacts-trigger-btn:hover {
            background: #eef2ff;
            border-color: #4a90e2;
        }
        .contacts-dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            max-height: 380px;
            overflow-y: auto;
            z-index: 200;
            border: 1px solid #e2e8f0;
            display: none;
        }
        .contacts-dropdown-menu.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Köşede kapatma butonu */
        .dropdown-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid #eef2f6;
            background: #fafcff;
            border-radius: 24px 24px 0 0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 5;
        }
        .dropdown-header h4 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e293b;
        }
        .close-dropdown-btn {
            background: #f1f5f9;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            transition: all 0.2s;
        }
        .close-dropdown-btn:hover {
            background: #e2e8f0;
            color: #1e293b;
        }
        .contacts-list-scroll {
            padding: 8px 0;
        }
        .dropdown-contact-item {
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: background 0.15s;
        }
        .dropdown-contact-item:hover {
            background: #f8fafc;
        }
        .dropdown-contact-item.active {
            background: #eef2ff;
            border-left: 3px solid #4a90e2;
        }
        .contact-number-badge {
            background: #e2e8f0;
            color: #475569;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .dropdown-contact-info {
            flex: 1;
        }
        .dropdown-contact-name {
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .dropdown-contact-phone {
            font-size: 0.65rem;
            color: #64748b;
            font-family: monospace;
            margin-top: 3px;
        }
        .dropdown-contact-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .status-dot.online { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
        .status-dot.offline { background: #ef4444; }
        .status-dot.connecting { background: #eab308; animation: pulse 1s infinite; }
        .status-dot.pending { background: #f97316; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .contact-badge-sm {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: #e2e8f0;
        }
        .pending-badge-sm {
            background: #f97316;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
        }
        .unread-badge-sm {
            background: #ef4444;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
        }
        .add-contact-quick {
            padding: 14px 18px;
            border-top: 1px solid #eef2f6;
            background: #fafcff;
            color: #4a90e2;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 0 0 24px 24px;
        }
        .add-contact-quick:hover {
            background: #eff6ff;
        }

        .system-msg { background: #eef2ff; font-size: 0.7rem; text-align: center; padding: 6px 12px; border-radius: 20px; color: #475569; }

        @media (max-width: 560px) {
            body { padding: 0; }
            .chat-container { max-width: 100%; height: 100vh; max-height: none; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <!-- Üst Alan: Logo + Ayarlar ve Kişilerim tuşları -->
        <div class="app-header">
            <div class="logo-area">
                <div class="logo-icon">💬</div>
                <div class="header-text">
                    <h2>SEYFİÇET</h2>
                </div>
            </div>
            <div class="header-buttons">
                <button class="header-icon-btn" id="settingsBtn">⚙️ Ayarlar</button>
                <button class="header-icon-btn" id="contactsMenuBtn">📒 Kişilerim</button>
            </div>
        </div>
        
        <!-- Durum çubuğu -->
        <div class="chat-header" id="statusBar">
            ✅ Hazır
        </div>
        
        <!-- Aktif sohbet bilgisi + bağlantı durumu LED'i -->
        <div class="current-chat-info">
            <div class="chat-name-with-status">
                <span>💬 Sohbet:</span>
                <span id="activeContactName" class="current-chat-name">Seçili kişi yok</span>
                <span id="onlineLed" class="online-status-led offline" style="display: none;"></span>
            </div>
            <span id="typingIndicator" style="display:none;" class="typing-indicator">✍️ Yazıyor...</span>
        </div>
        
        <!-- Mesaj alanı -->
        <div class="messages-area" id="messagesArea"></div>
        
        <!-- Mesaj giriş alanı (sadece yazı) -->
        <div class="input-container">
            <div class="message-input-row">
                <input type="text" id="messageInput" placeholder="Mesaj yazın..." disabled>
                <button id="sendButton" disabled>Gönder</button>
            </div>
        </div>
    </div>

    <!-- AYARLAR MODALI (Telefon Numarası) -->
    <div id="settingsModal" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h3>⚙️ Ayarlar</h3>
            <p style="font-size: 0.75rem; color:#475569; margin-bottom: 12px;">Telefon numaranız sizin benzersiz kimliğinizdir. Diğer kişiler sizi bu numara ile ekleyebilir.</p>
            <input type="tel" id="settingsPhoneInput" placeholder="Telefon numarası (Örn: 905551234567)">
            <div class="modal-buttons">
                <button class="modal-cancel" id="settingsCancelBtn">Vazgeç</button>
                <button class="modal-save" id="settingsSaveBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <!-- KİŞİLERİM AÇILIR KUTU (Dropdown) -->
    <div id="contactsDropdown" class="contacts-dropdown-wrapper" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(3px);">
        <div style="width: 90%; max-width: 400px; margin: auto; position: relative;">
            <div class="contacts-dropdown-menu" style="display: block; position: relative; max-height: 500px;">
                <div class="dropdown-header">
                    <h4>📒 Kişilerim</h4>
                    <button class="close-dropdown-btn" id="closeContactsDropdownBtn">✕</button>
                </div>
                <div class="contacts-list-scroll" id="contactsDropdownList">
                    <!-- Kişiler buraya dinamik olarak eklenecek -->
                </div>
                <div class="add-contact-quick" id="addContactQuickBtn">
                    ➕ Yeni Kişi Ekle
                </div>
            </div>
        </div>
    </div>

    <!-- YENİ KİŞİ EKLEME MODALI -->
    <div id="addContactModal" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h3>➕ Yeni Kişi Ekle</h3>
            <input type="text" id="newContactName" placeholder="Kişi adı (Örn: Ahmet)">
            <input type="tel" id="newContactPhone" placeholder="Telefon Numarası (Örn: 905551234567)">
            <div class="modal-buttons">
                <button class="modal-cancel" id="addContactModalCancel">Vazgeç</button>
                <button class="modal-save" id="addContactModalSave">Ekle</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        // ---------- UYGULAMA (Sadece yazı mesajı, dosya/resim/emoji kaldırıldı) ----------
        let myPhoneNumber = null;
        let peer, currentConnection, isConnected = false;
        let activeContactId = null, activeContactName = "";
        let contacts = [], messagesHistory = {}, pendingMessages = {}, contactStatus = {}, unreadCounts = {};
        
        // DOM Elemanları
        const dom = {
            statusBar: document.getElementById('statusBar'),
            activeContactNameSpan: document.getElementById('activeContactName'),
            onlineLed: document.getElementById('onlineLed'),
            typingIndicator: document.getElementById('typingIndicator'),
            messagesArea: document.getElementById('messagesArea'),
            messageInput: document.getElementById('messageInput'),
            sendButton: document.getElementById('sendButton'),
            settingsBtn: document.getElementById('settingsBtn'),
            contactsMenuBtn: document.getElementById('contactsMenuBtn'),
            settingsModal: document.getElementById('settingsModal'),
            settingsPhoneInput: document.getElementById('settingsPhoneInput'),
            settingsCancelBtn: document.getElementById('settingsCancelBtn'),
            settingsSaveBtn: document.getElementById('settingsSaveBtn'),
            contactsDropdown: document.getElementById('contactsDropdown'),
            contactsDropdownList: document.getElementById('contactsDropdownList'),
            closeContactsDropdownBtn: document.getElementById('closeContactsDropdownBtn'),
            addContactQuickBtn: document.getElementById('addContactQuickBtn'),
            addContactModal: document.getElementById('addContactModal'),
            newContactName: document.getElementById('newContactName'),
            newContactPhone: document.getElementById('newContactPhone'),
            addContactModalCancel: document.getElementById('addContactModalCancel'),
            addContactModalSave: document.getElementById('addContactModalSave')
        };
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        function showNotification(title, body) { if(Notification.permission === 'granted') new Notification(title, {body}); else if(Notification.permission !== 'denied') Notification.requestPermission(); }
        
        // LED durumunu güncelle (sohbet başlığında yeşil/kırmızı ışık)
        function updateOnlineLed() {
            if(!activeContactId) {
                dom.onlineLed.style.display = 'none';
                return;
            }
            const status = contactStatus[activeContactId] || 'offline';
            dom.onlineLed.style.display = 'inline-block';
            dom.onlineLed.className = 'online-status-led';
            if(status === 'connected') {
                dom.onlineLed.classList.add('online');
            } else if(status === 'connecting' || status === 'pending') {
                dom.onlineLed.classList.add('connecting');
            } else {
                dom.onlineLed.classList.add('offline');
            }
        }
        
        // Telefon numarası işlemleri
        function savePhoneNumber(phone) {
            let cleaned = phone.replace(/\s/g, '');
            if(!cleaned) return false;
            localStorage.setItem('p2p_my_phone', cleaned);
            myPhoneNumber = cleaned;
            return true;
        }
        function getStoredPhone() { return localStorage.getItem('p2p_my_phone'); }
        
        // PeerJS başlat
        function initPeerWithPhone(phone) {
            if(peer && !peer.destroyed) peer.destroy();
            peer = new Peer(phone, { debug: 0, config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
            peer.on('open', () => {
                dom.statusBar.innerHTML = `✅ ${myPhoneNumber} aktif - P2P hazır`;
            });
            peer.on('error', (err) => {
                if(err.type === 'unavailable-id') {
                    dom.statusBar.innerHTML = `⚠️ Bu numara kullanımda veya geçersiz. Ayarlardan değiştirin.`;
                    showSettingsModal();
                } else {
                    dom.statusBar.innerHTML = `⚠️ Bağlantı hatası: ${err.type}`;
                }
            });
            peer.on('connection', handleIncoming);
        }
        
        function showSettingsModal() {
            dom.settingsPhoneInput.value = myPhoneNumber || '';
            dom.settingsModal.style.display = 'flex';
        }
        
        function changePhoneNumber(newPhone) {
            if(!newPhone || newPhone === myPhoneNumber) return false;
            if(currentConnection) { try { currentConnection.close(); } catch(e) {} }
            currentConnection = null; isConnected = false; activeContactId = null; activeContactName = "";
            if(peer && !peer.destroyed) peer.destroy();
            savePhoneNumber(newPhone);
            // Verileri sıfırla (farklı kimlik olduğu için)
            contacts = []; messagesHistory = {}; pendingMessages = {}; contactStatus = {}; unreadCounts = {};
            saveContacts(); saveMessages();
            updateActiveContactDisplay();
            renderMessages();
            updateOnlineLed();
            initPeerWithPhone(myPhoneNumber);
            return true;
        }
        
        // Sadece metin gönderme
        function sendTextMessage(contactId, text) {
            if(!contactId || !text) return false;
            const isNow = (activeContactId === contactId && isConnected && currentConnection);
            if(isNow) {
                try {
                    let msg = { type: 'text', text: text };
                    currentConnection.send(msg);
                    addToHistory(contactId, text, 'Ben', true, 'text');
                    return true;
                } catch(e) { 
                    queueMsg(contactId, {type:'text', content:text});
                    return false; 
                }
            } else { 
                queueMsg(contactId, {type:'text', content:text});
                return false; 
            }
        }
        
        function queueMsg(contactId, msg) {
            if(!pendingMessages[contactId]) pendingMessages[contactId]=[];
            pendingMessages[contactId].push(msg);
            if(contactStatus[contactId] !== 'connected') updateContactStatus(contactId,'pending');
            addToHistory(contactId, `⏳ ${msg.content} (beklemede)`, 'Ben', true, 'text', true);
        }
        
        function flushPending(contactId) {
            if(!pendingMessages[contactId]?.length || !currentConnection || !isConnected || activeContactId !== contactId) return;
            let pending = [...pendingMessages[contactId]];
            pendingMessages[contactId]=[];
            for(let msg of pending) {
                if(msg.type === 'text') {
                    try {
                        currentConnection.send({ type: 'text', text: msg.content });
                        addToHistory(contactId, msg.content, 'Ben', true, 'text');
                    } catch(e){ 
                        if(!pendingMessages[contactId]) pendingMessages[contactId]=[];
                        pendingMessages[contactId].unshift(msg); 
                    }
                }
            }
            addSystemMessage(`${pending.length} bekleyen mesaj gönderildi.`);
            updateContactStatus(contactId,'connected');
            updateOnlineLed();
        }
        
        function addToHistory(contactId, content, sender, isSent, msgType, isPending=false) {
            if(!messagesHistory[contactId]) messagesHistory[contactId]=[];
            messagesHistory[contactId].push({content, sender, isSent, msgType, isPending, read: isSent, timestamp: Date.now()});
            saveMessages();
            if(activeContactId===contactId) renderMessages();
            if(!isSent && activeContactId!==contactId) {
                unreadCounts[contactId]=(unreadCounts[contactId]||0)+1;
                if(Notification.permission==='granted') showNotification(sender, content.length>30?content.substring(0,30)+'...':content);
            }
        }
        
        function updateContactStatus(id, status) { 
            contactStatus[id]=status;
            if(activeContactId === id) updateOnlineLed();
        }
        
        function setupConnection(conn, contactId, contactName) {
            conn.on('open', () => {
                if(activeContactId===contactId) {
                    isConnected=true; 
                    setConnectedState(true);
                    updateContactStatus(contactId,'connected');
                    dom.statusBar.innerHTML = `✅ ${contactName} ile bağlantı aktif`;
                    addSystemMessage(`${contactName} ile görüşmeye hazırsınız.`);
                    flushPending(contactId);
                    updateOnlineLed();
                }
            });
            let typingTimer;
            conn.on('data', (data) => {
                if(activeContactId===contactId && currentConnection===conn && data.type === 'text') {
                    addToHistory(contactId, data.text, contactName, false, 'text');
                }
                // Yazma bildirimi (isteğe bağlı)
                if(data.type === 'typing') {
                    dom.typingIndicator.style.display='inline-block';
                    clearTimeout(typingTimer);
                    typingTimer=setTimeout(()=>dom.typingIndicator.style.display='none',2000);
                }
            });
            conn.on('close', () => {
                if(activeContactId===contactId && currentConnection===conn) {
                    addSystemMessage(`${contactName} bağlantıyı kapattı.`);
                    updateContactStatus(contactId,'offline');
                    setConnectedState(false);
                    currentConnection=null; isConnected=false;
                    dom.statusBar.innerHTML = `⚠️ ${contactName} ile bağlantı kesildi`;
                    updateOnlineLed();
                }
            });
        }
        
        // Kişi seçildiğinde otomatik bağlan
        function selectAndConnect(contactId, phone, name) {
            if(activeContactId === contactId && isConnected) return;
            if(currentConnection) disconnectCurrent();
            activeContactId = contactId; activeContactName = name;
            dom.activeContactNameSpan.innerText = name;
            renderMessages();
            updateContactStatus(contactId, 'connecting');
            updateOnlineLed();
            dom.statusBar.innerHTML = `🔄 ${name} bağlanıyor...`;
            let newConn = peer.connect(phone);
            if(!newConn) { updateContactStatus(contactId, 'offline'); dom.statusBar.innerHTML = `❌ ${name} bağlanılamadı`; updateOnlineLed(); return; }
            currentConnection = newConn;
            setupConnection(currentConnection, contactId, name);
            setTimeout(() => {
                if(currentConnection === newConn && !isConnected) {
                    updateContactStatus(contactId, 'offline');
                    addSystemMessage(`${name} bağlantı zaman aşımı`);
                    setConnectedState(false);
                    currentConnection=null;
                    dom.statusBar.innerHTML = `⏰ ${name} bağlantı zaman aşımı`;
                    updateOnlineLed();
                }
            }, 10000);
        }
        
        function disconnectCurrent() {
            if(currentConnection) {
                let contact = contacts.find(c=>c.id===activeContactId);
                if(contact) {
                    updateContactStatus(activeContactId,'offline');
                    addSystemMessage(`${contact.name} ile bağlantı kesildi.`);
                }
                currentConnection.close();
                currentConnection=null; isConnected=false;
                setConnectedState(false);
                dom.statusBar.innerHTML = `❌ Bağlantı kesildi`;
                updateOnlineLed();
            }
        }
        
        function setConnectedState(connected) {
            isConnected=connected;
            dom.messageInput.disabled=!connected;
            dom.sendButton.disabled=!connected;
            if(!connected && activeContactId) dom.messageInput.placeholder="Mesaj yazın (bağlantı yok)";
            else if(connected) dom.messageInput.placeholder="Mesaj yazın...";
            updateOnlineLed();
        }
        
        function sendText() {
            if(!activeContactId) { addSystemMessage('Önce bir kişi seçin.'); return; }
            let text=dom.messageInput.value.trim();
            if(!text) return;
            sendTextMessage(activeContactId, text);
            dom.messageInput.value='';
        }
        
        function renderMessages() {
            if(!dom.messagesArea) return;
            dom.messagesArea.innerHTML = '';
            if(!activeContactId) {
                dom.messagesArea.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:30px;">👈 Kişilerimden birini seçerek sohbet başlatın</div>';
                return;
            }
            let history = messagesHistory[activeContactId] || [];
            history.forEach(msg => {
                let div = document.createElement('div'); div.className = `message ${msg.isSent ? 'sent' : 'received'}`;
                let timeStr = new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
                let contentHtml = `<div class="message-content">${!msg.isSent ? `<strong>${escapeHtml(msg.sender)}:</strong> ` : ''}${escapeHtml(msg.content)}</div>`;
                let readHtml = msg.isSent ? `<div class="read-status ${msg.read ? 'read' : ''}">${msg.read ? '✓✓ Okundu' : '✓ Gönderildi'}</div>` : '';
                div.innerHTML = contentHtml + `<div style="font-size:0.6rem; color:#94a3b8;">${timeStr}</div>` + readHtml;
                dom.messagesArea.appendChild(div);
            });
            dom.messagesArea.scrollTop = dom.messagesArea.scrollHeight;
            if(unreadCounts[activeContactId]) delete unreadCounts[activeContactId];
        }
        
        function addSystemMessage(text) {
            if(!activeContactId) return;
            let div=document.createElement('div'); div.className='message received'; div.style.alignSelf='center';
            div.innerHTML=`<div class="message-content system-msg">📡 ${escapeHtml(text)}</div>`;
            dom.messagesArea.appendChild(div);
            dom.messagesArea.scrollTop=dom.messagesArea.scrollHeight;
        }
        
        function updateActiveContactDisplay() {
            dom.activeContactNameSpan.innerText = activeContactName || "Seçili kişi yok";
            updateOnlineLed();
        }
        
        function handleIncoming(incoming) {
            let contact=contacts.find(c=>c.phoneNumber===incoming.peer);
            if(!contact) { incoming.close(); return; }
            if(currentConnection && isConnected) { incoming.close(); return; }
            if(currentConnection) currentConnection.close();
            currentConnection=incoming;
            activeContactId=contact.id; activeContactName=contact.name;
            dom.activeContactNameSpan.innerText=contact.name;
            renderMessages();
            setupConnection(currentConnection, contact.id, contact.name);
            updateContactStatus(contact.id,'connected');
            setConnectedState(true);
            addSystemMessage(`${contact.name} sizinle bağlantı kurdu.`);
            flushPending(contact.id);
            dom.statusBar.innerHTML = `✅ ${contact.name} ile bağlantı aktif`;
            updateOnlineLed();
        }
        
        // Veri kaydetme
        function saveContacts() { localStorage.setItem('p2p_contacts_v3', JSON.stringify(contacts)); }
        function saveMessages() { localStorage.setItem('p2p_messages_v3', JSON.stringify(messagesHistory)); }
        function loadContacts() { let stored=localStorage.getItem('p2p_contacts_v3'); contacts=stored?JSON.parse(stored):[]; contacts.forEach(c=>{ if(!contactStatus[c.id]) contactStatus[c.id]='offline'; if(!pendingMessages[c.id]) pendingMessages[c.id]=[]; }); }
        function loadMessages() { let stored=localStorage.getItem('p2p_messages_v3'); messagesHistory=stored?JSON.parse(stored):{}; }
        
        // Kişileri Açılır Kutuda Göster (Numaralandırılmış)
        function renderContactsDropdown() {
            if(!dom.contactsDropdownList) return;
            if(contacts.length === 0) {
                dom.contactsDropdownList.innerHTML = '<div style="padding: 40px; text-align:center; color:#94a3b8;">📭 Henüz kişi eklenmemiş<br>➕ Yeni Kişi Ekle</div>';
                return;
            }
            let html = '';
            contacts.forEach((contact, index) => {
                let status = contactStatus[contact.id] || 'offline';
                let statusClass = status === 'connected' ? 'online' : (status === 'connecting' ? 'connecting' : (status === 'pending' ? 'pending' : 'offline'));
                let isActive = activeContactId === contact.id;
                let pendingCount = pendingMessages[contact.id]?.length || 0;
                let unreadCount = unreadCounts[contact.id] || 0;
                html += `
                    <div class="dropdown-contact-item ${isActive ? 'active' : ''}" data-id="${contact.id}" data-phone="${contact.phoneNumber}" data-name="${escapeHtml(contact.name)}">
                        <div style="display: flex; align-items: center; flex: 1;">
                            <div class="contact-number-badge">${index + 1}</div>
                            <div class="dropdown-contact-info">
                                <div class="dropdown-contact-name">
                                    ${escapeHtml(contact.name)}
                                    ${status === 'connected' ? '<span class="contact-badge-sm" style="background:#22c55e20; color:#166534;">🟢 Çevrimiçi</span>' : ''}
                                    ${pendingCount ? `<span class="pending-badge-sm">📬 ${pendingCount}</span>` : ''}
                                    ${unreadCount ? `<span class="unread-badge-sm">🔔 ${unreadCount}</span>` : ''}
                                </div>
                                <div class="dropdown-contact-phone">📞 ${escapeHtml(contact.phoneNumber)}</div>
                            </div>
                        </div>
                        <div class="dropdown-contact-status">
                            <div class="status-dot ${statusClass}"></div>
                        </div>
                    </div>
                `;
            });
            dom.contactsDropdownList.innerHTML = html;
            document.querySelectorAll('#contactsDropdownList .dropdown-contact-item').forEach(item => {
                item.addEventListener('click', () => {
                    let id = item.dataset.id, phone = item.dataset.phone, name = item.dataset.name;
                    selectAndConnect(id, phone, name);
                    dom.contactsDropdown.style.display = 'none';
                });
            });
        }
        
        function openAddContactModal() {
            dom.newContactName.value = '';
            dom.newContactPhone.value = '';
            dom.addContactModal.style.display = 'flex';
        }
        
        function addNewContact() {
            let name = dom.newContactName.value.trim();
            let phone = dom.newContactPhone.value.trim().replace(/\s/g, '');
            if(!name || !phone) { alert('Lütfen ad ve telefon numarası girin'); return; }
            if(contacts.some(c => c.phoneNumber === phone)) { alert('Bu telefon numarası zaten listede'); return; }
            let newId = Date.now() + '_' + Math.random().toString(36);
            contacts.push({ id: newId, name, phoneNumber: phone });
            contactStatus[newId] = 'offline';
            pendingMessages[newId] = [];
            saveContacts();
            dom.addContactModal.style.display = 'none';
            if(dom.contactsDropdown.style.display === 'flex') renderContactsDropdown();
        }
        
        // Başlangıç
        function init() {
            let stored=getStoredPhone();
            if(stored) { myPhoneNumber=stored; initPeerWithPhone(myPhoneNumber); }
            else { showSettingsModal(); }
            loadContacts(); loadMessages(); renderMessages();
            if(Notification.permission==='default') Notification.requestPermission();
        }
        
        // Event listeners
        dom.sendButton.onclick = sendText;
        dom.messageInput.onkeypress = (e) => { if(e.key==='Enter' && activeContactId && isConnected) sendText(); };
        
        dom.settingsBtn.onclick = showSettingsModal;
        dom.settingsCancelBtn.onclick = () => { dom.settingsModal.style.display = 'none'; if(!myPhoneNumber) init(); };
        dom.settingsSaveBtn.onclick = () => {
            let newPhone = dom.settingsPhoneInput.value.trim().replace(/\s/g, '');
            if(!newPhone) { alert('Geçerli bir telefon numarası girin'); return; }
            changePhoneNumber(newPhone);
            dom.settingsModal.style.display = 'none';
        };
        
        dom.contactsMenuBtn.onclick = () => {
            renderContactsDropdown();
            dom.contactsDropdown.style.display = 'flex';
        };
        dom.closeContactsDropdownBtn.onclick = () => { dom.contactsDropdown.style.display = 'none'; };
        dom.addContactQuickBtn.onclick = () => { openAddContactModal(); };
        
        dom.addContactModalCancel.onclick = () => { dom.addContactModal.style.display = 'none'; };
        dom.addContactModalSave.onclick = addNewContact;
        
        init();
    </script>
</body>
</html>
