<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SEYFİÇET - P2P Mesajlaşma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon { font-size: 1.6rem; }
        .header-text h2 { font-size: 1.3rem; font-weight: 700; line-height: 1.2; }
        .sub-title { font-size: 0.65rem; opacity: 0.9; margin-top: 2px; }
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .connection-bar {
            background: #4a90e2;
            color: white;
            padding: 4px 12px;
            text-align: center;
            font-size: 0.7rem;
            flex-shrink: 0;
        }
        .connection-bar.error {
            background: #dc2626;
        }
        .connection-bar.success {
            background: #22c55e;
        }

        .current-chat-header {
            background: #f8fafc;
            padding: 10px 16px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .chat-contact-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-status-light {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .chat-status-light.online { background: #22c55e; box-shadow: 0 0 5px #22c55e; }
        .chat-status-light.offline { background: #94a3b8; }
        .chat-status-light.connecting { background: #eab308; animation: pulse 1s infinite; }
        .chat-contact-name {
            font-weight: 600;
            font-size: 1rem;
            color: #0f172a;
        }
        .typing-badge-small {
            font-size: 0.65rem;
            color: #4a90e2;
            font-style: italic;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #f1f5f9;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message { display: flex; flex-direction: column; max-width: 85%; }
        .message.sent { align-self: flex-end; align-items: flex-end; }
        .message.received { align-self: flex-start; align-items: flex-start; }

        .message-content {
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .sent .message-content { background: #4a90e2; color: white; border-bottom-right-radius: 4px; }
        .received .message-content { background: white; color: #1e293b; border: 0.5px solid #e2e8f0; border-bottom-left-radius: 4px; }
        .message-time {
            font-size: 0.55rem;
            color: #64748b;
            margin-top: 2px;
            margin-right: 4px;
        }

        .input-container {
            flex-shrink: 0;
            background: white;
            border-top: 1px solid #edf2f7;
            padding: 10px 12px;
        }
        .message-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 28px;
            outline: none;
            font-size: 0.9rem;
        }
        #sendButton {
            padding: 10px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 28px;
            font-weight: 600;
            cursor: pointer;
        }
        #sendButton:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .action-buttons-row {
            display: flex;
            gap: 12px;
            padding: 4px 4px 0 4px;
        }
        .action-icon-btn {
            background: #f1f5f9;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 85%;
            max-width: 320px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 20px rgba(0,0,0,0.15);
            z-index: 2000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar.open {
            right: 0;
        }
        .sidebar-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h3 {
            font-size: 1.2rem;
        }
        .close-sidebar {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.5rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
        }
        .sidebar-content {
            flex: 1;
            padding: 16px;
        }
        .settings-section {
            margin-bottom: 24px;
        }
        .settings-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 6px;
        }
        .settings-value {
            background: #f1f5f9;
            padding: 10px 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            word-break: break-all;
        }
        .settings-value span {
            font-family: monospace;
            font-size: 0.8rem;
            flex: 1;
        }
        .mini-btn {
            background: #e2e8f0;
            border: none;
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 0.65rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .mini-btn.primary {
            background: #4a90e2;
            color: white;
        }
        .warning-text {
            font-size: 0.6rem;
            color: #f97316;
            margin-top: 6px;
            text-align: center;
        }
        .info-text {
            font-size: 0.6rem;
            color: #22c55e;
            margin-top: 6px;
            text-align: center;
        }
        .contacts-list-sidebar {
            margin-top: 16px;
        }
        .contact-item-sidebar {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
        }
        .contact-item-sidebar.active-contact {
            background: #e3f2fd;
            border-color: #4a90e2;
        }
        .contact-info-sidebar {
            flex: 1;
        }
        .contact-name-sidebar {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .contact-phone-sidebar {
            font-size: 0.6rem;
            color: #64748b;
            font-family: monospace;
        }
        .contact-badge {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 6px;
        }
        .contact-badge.online { background: #22c55e; color: white; }
        .contact-badge.pending { background: #f97316; color: white; }
        .contact-badge.unread { background: #ef4444; color: white; }
        .contact-actions-sidebar {
            display: flex;
            gap: 6px;
        }
        .contact-action-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px;
        }
        .add-contact-btn-sidebar {
            width: 100%;
            background: #4a90e2;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 24px;
            font-weight: 600;
            margin-top: 16px;
            cursor: pointer;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-content {
            background: white;
            width: 85%;
            max-width: 300px;
            border-radius: 24px;
            padding: 20px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px 12px;
            margin: 8px 0;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-save { background: #4a90e2; color: white; flex: 1; padding: 8px; border-radius: 25px; border: none; cursor: pointer; }
        .modal-cancel { background: #e2e8f0; color: #334155; flex: 1; border: none; border-radius: 25px; cursor: pointer; }

        .emoji-picker {
            position: fixed;
            bottom: 95px;
            left: 10px;
            right: 10px;
            background: white;
            border-radius: 20px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            z-index: 2500;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }
        .emoji-picker span { font-size: 1.5rem; cursor: pointer; text-align: center; padding: 5px; }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .no-contact-selected {
            text-align: center;
            color: #94a3b8;
            padding: 40px;
            font-size: 0.9rem;
        }
        .retry-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.65rem;
            cursor: pointer;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <div class="app-header">
            <div class="logo-section">
                <div class="logo-icon">💬</div>
                <div class="header-text">
                    <h2>SEYFİÇET</h2>
                    <div class="sub-title">🔒 Telefon No ile P2P</div>
                </div>
            </div>
            <div class="header-buttons">
                <button class="icon-btn" id="settingsBtn">⚙️</button>
                <button class="icon-btn" id="contactsBtn">👥</button>
            </div>
        </div>
        <div class="connection-bar" id="status">Başlatılıyor...</div>

        <div class="current-chat-header" id="currentChatHeader" style="display: none;">
            <div class="chat-contact-info">
                <div class="chat-status-light" id="chatStatusLight"></div>
                <span class="chat-contact-name" id="currentChatName">Seçili kişi yok</span>
                <span id="chatTypingIndicator" style="display:none;" class="typing-badge-small">✍️ Yazıyor...</span>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="no-contact-selected">👈 Sağ üstten bir kişi seçin</div>
        </div>

        <div class="input-container" id="inputContainer" style="display: none;">
            <div class="message-input-row">
                <input type="text" id="messageInput" placeholder="Mesaj yazın..." disabled>
                <button id="sendButton" disabled>Gönder</button>
            </div>
            <div class="action-buttons-row">
                <button class="action-icon-btn" id="emojiBtn">😊 Emoji</button>
                <button class="action-icon-btn" id="fileBtn">📎 Dosya</button>
                <button class="action-icon-btn" id="imageBtn">🖼️ Resim</button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 id="sidebarTitle">Ayarlar</h3>
            <button class="close-sidebar" id="closeSidebar">✕</button>
        </div>
        <div class="sidebar-content" id="sidebarContent"></div>
    </div>

    <div id="contactModal" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h3>➕ Yeni Kişi Ekle</h3>
            <input type="text" id="contactNameInput" placeholder="Kişi adı">
            <input type="tel" id="contactPhoneInput" placeholder="Tel no:+905551234567">
            <div class="modal-buttons">
                <button class="modal-cancel" id="modalCancelBtn">Vazgeç</button>
                <button class="modal-save" id="modalSaveBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <div id="editPhoneModal" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h3>📞 Telefon Numaranız</h3>
            <input type="tel" id="editPhoneInput" placeholder="+905551234567 şeklinde">
            <div class="warning-text">⚠️ Bu numara sizin kimliğinizdir. Karşı taraf size bu numara ile bağlanacak.</div>
                        <div class="modal-buttons">
                <button class="modal-cancel" id="editPhoneCancel">Vazgeç</button>
                <button class="modal-save" id="editPhoneSave">Kaydet</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        // Daha güvenilir STUN sunucuları
        const PEER_CONFIG = {
            debug: 0,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun.stunprotocol.org:3478' },
                    { urls: 'stun:stun.voipbuster.com:3478' }
                ]
            }
        };

        let myPhoneNumber = "";
        let peer = null;
        let currentConnection = null;
        let isConnected = false;
        let activeContactId = null;
        let activeContactName = "";
        let contacts = [];
        let messagesHistory = {};
        let pendingMessages = {};
        let contactStatus = {};
        let unreadCounts = {};
        let currentSidebarMode = 'settings';
        let emojiPicker = null;
        let reconnectTimeout = null;

        const elements = {
            statusDiv: document.getElementById('status'),
            messagesArea: document.getElementById('messagesArea'),
            messageInput: document.getElementById('messageInput'),
            sendButton: document.getElementById('sendButton'),
            inputContainer: document.getElementById('inputContainer'),
            currentChatHeader: document.getElementById('currentChatHeader'),
            currentChatName: document.getElementById('currentChatName'),
            chatStatusLight: document.getElementById('chatStatusLight'),
            chatTypingIndicator: document.getElementById('chatTypingIndicator'),
            settingsBtn: document.getElementById('settingsBtn'),
            contactsBtn: document.getElementById('contactsBtn'),
            sidebar: document.getElementById('sidebar'),
            sidebarTitle: document.getElementById('sidebarTitle'),
            sidebarContent: document.getElementById('sidebarContent'),
            closeSidebar: document.getElementById('closeSidebar'),
            emojiBtn: document.getElementById('emojiBtn'),
            fileBtn: document.getElementById('fileBtn'),
            imageBtn: document.getElementById('imageBtn')
        };

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); }
        
        function showNotification(title, body) {
            if (Notification.permission === 'granted') new Notification(title, { body });
            else if (Notification.permission !== 'denied') Notification.requestPermission();
        }

        function updateStatus(message, isError = false, isSuccess = false) {
            elements.statusDiv.innerHTML = message;
            elements.statusDiv.classList.remove('error', 'success');
            if (isError) elements.statusDiv.classList.add('error');
            if (isSuccess) elements.statusDiv.classList.add('success');
        }

        function loadPhoneNumber() {
            let saved = localStorage.getItem('seyficet_phone');
            if (saved && saved.trim() !== "") {
                myPhoneNumber = saved.trim();
                return true;
            }
            myPhoneNumber = "";
            return false;
        }

        function savePhoneNumber(phone) {
            if (!phone || phone.trim() === "") {
                myPhoneNumber = "";
                localStorage.removeItem('seyficet_phone');
                if (peer) peer.destroy();
                peer = null;
                updateStatus('⚠️ Telefon numarası ayarlanmadı', true);
                return false;
            }
            let cleanPhone = phone.trim().replace(/\s/g, '');
            myPhoneNumber = cleanPhone;
            localStorage.setItem('seyficet_phone', myPhoneNumber);
            initPeer();
            return true;
        }

        function initPeer() {
            if (!myPhoneNumber || myPhoneNumber === "") {
                updateStatus('⚠️ Lütfen ayarlardan telefon numaranızı girin', true);
                return;
            }
            
            if (peer) {
                peer.destroy();
                peer = null;
            }
            
            updateStatus(`🔄 ${myPhoneNumber} bağlanıyor...`);
            
            try {
                peer = new Peer(myPhoneNumber, PEER_CONFIG);
                
                peer.on('open', (id) => {
                    updateStatus(`✅ ${id} aktif - Bağlantıya hazır`, false, true);
                });
                
                peer.on('error', (err) => {
                    console.error('Peer error:', err);
                    if (err.type === 'unavailable-id') {
                        updateStatus(`❌ "${myPhoneNumber}" numarası kullanımda! Lütfen farklı bir numara girin.`, true);
                    } else if (err.type === 'network') {
                        updateStatus(`⚠️ Ağ bağlantı sorunu. Yeniden bağlanılıyor...`, true);
                        setTimeout(() => initPeer(), 3000);
                    } else {
                        updateStatus(`⚠️ Bağlantı hatası: ${err.type || 'bilinmeyen'}`, true);
                    }
                });
                
                peer.on('connection', handleIncomingConnection);
                
                peer.on('disconnected', () => {
                    updateStatus(`⚠️ Bağlantı kesildi, yeniden bağlanılıyor...`, true);
                    setTimeout(() => {
                        if (peer) peer.reconnect();
                    }, 2000);
                });
                
                peer.on('close', () => {
                    updateStatus(`❌ Bağlantı kapandı`, true);
                });
                
            } catch (e) {
                console.error('Peer init error:', e);
                updateStatus(`❌ Başlatma hatası: ${e.message}`, true);
            }
        }

        function handleIncomingConnection(incoming) {
            let contact = contacts.find(c => c.phoneNumber === incoming.peer);
            if (!contact) {
                incoming.close();
                return;
            }
            
            if (currentConnection && isConnected) {
                incoming.close();
                return;
            }
            
            if (currentConnection) {
                currentConnection.close();
            }
            
            currentConnection = incoming;
            activeContactId = contact.id;
            activeContactName = contact.name;
            elements.currentChatName.innerText = contact.name;
            
            setupConnectionEvents(currentConnection, contact.id, contact.name);
            updateContactStatus(contact.id, 'connected');
            setConnectedState(true);
            updateStatus(`✅ ${contact.name} (${contact.phoneNumber}) ile bağlantı kuruldu`, false, true);
            addSystemMessage(`${contact.name} sizinle bağlantı kurdu.`);
            flushPendingMessages(contact.id);
            showChatInterface(true);
            renderMessagesForActiveContact();
            renderSidebarContent();
        }

        function setupConnectionEvents(connection, contactId, contactName) {
            connection.on('open', () => {
                if (activeContactId === contactId) {
                    isConnected = true;
                    setConnectedState(true);
                    updateContactStatus(contactId, 'connected');
                    updateStatus(`✅ ${contactName} ile görüşme başladı`, false, true);
                    addSystemMessage(`${contactName} ile bağlantı hazır.`);
                    flushPendingMessages(contactId);
                }
            });
            
            let typingTimeout = null;
            connection.on('data', (data) => {
                if (activeContactId === contactId && currentConnection === connection) {
                    if (data.type === 'text') {
                        addMessageToHistory(contactId, data.text, contactName, false, 'text');
                    } else if (data.type === 'file') {
                        addMessageToHistory(contactId, data.name, contactName, false, 'file', data.data, data.mime);
                    } else if (data.type === 'image') {
                        addMessageToHistory(contactId, data.name, contactName, false, 'image', data.data, data.mime);
                    } else if (data.type === 'typing') {
                        elements.chatTypingIndicator.style.display = 'inline-block';
                        if (typingTimeout) clearTimeout(typingTimeout);
                        typingTimeout = setTimeout(() => elements.chatTypingIndicator.style.display = 'none', 2000);
                    }
                }
            });
            
            connection.on('close', () => {
                if (activeContactId === contactId && currentConnection === connection) {
                    addSystemMessage(`${contactName} bağlantıyı kapattı.`);
                    updateContactStatus(contactId, 'offline');
                    setConnectedState(false);
                    currentConnection = null;
                    isConnected = false;
                    updateStatus(`❌ ${contactName} ile bağlantı kesildi`);
                }
            });
            
            connection.on('error', (err) => {
                console.error('Connection error:', err);
                if (activeContactId === contactId && currentConnection === connection) {
                    updateContactStatus(contactId, 'offline');
                    setConnectedState(false);
                    currentConnection = null;
                    isConnected = false;
                    updateStatus(`⚠️ ${contactName} ile bağlantı hatası`, true);
                }
            });
        }

        function connectToContact(id, phoneNumber, name) {
            if (!myPhoneNumber || myPhoneNumber === "") {
                alert('Lütfen önce ayarlardan kendi telefon numaranızı girin.');
                return;
            }
            
            if (activeContactId === id && isConnected) {
                disconnectCurrent();
                return;
            }
            
            if (currentConnection) disconnectCurrent();
            
            activeContactId = id;
            activeContactName = name;
            elements.currentChatName.innerText = name;
            updateChatHeaderStatus();
            renderMessagesForActiveContact();
            updateContactStatus(id, 'connecting');
            updateStatus(`🔄 ${name} (${phoneNumber}) bağlanıyor...`);
            
            try {
                let newConn = peer.connect(phoneNumber);
                if (!newConn) {
                    updateContactStatus(id, 'offline');
                    updateStatus(`❌ ${name} bağlanamadı`, true);
                    return;
                }
                
                currentConnection = newConn;
                setupConnectionEvents(currentConnection, id, name);
                
                // 15 saniye timeout
                setTimeout(() => {
                    if (currentConnection === newConn && !isConnected) {
                        updateContactStatus(id, 'offline');
                        addSystemMessage(`${name} bağlantı zaman aşımı. Karşı taraf çevrimiçi mi?`);
                        setConnectedState(false);
                        currentConnection = null;
                        updateStatus(`⏰ ${name} bağlantı zaman aşımı`, true);
                    }
                }, 15000);
                
                showChatInterface(true);
            } catch (e) {
                console.error('Connect error:', e);
                updateContactStatus(id, 'offline');
                updateStatus(`❌ Bağlantı hatası: ${e.message}`, true);
            }
        }

        function disconnectCurrent() {
            if (currentConnection) {
                let contact = contacts.find(c => c.id === activeContactId);
                if (contact) {
                    updateContactStatus(activeContactId, 'offline');
                    addSystemMessage(`${contact.name} ile bağlantı kesildi.`);
                }
                currentConnection.close();
                currentConnection = null;
                isConnected = false;
                setConnectedState(false);
                updateStatus('❌ Bağlantı kesildi');
            }
        }

        function sendMessageWithQueue(contactId, type, content, fileData = null, mime = '', fileName = '') {
            if (!contactId) return false;
            const isConnectedNow = (activeContactId === contactId && isConnected && currentConnection);
            
            if (isConnectedNow) {
                try {
                    let msg = { type };
                    if (type === 'text') msg.text = content;
                    else { msg.name = fileName; msg.data = fileData; msg.mime = mime; }
                    currentConnection.send(msg);
                    addMessageToHistory(contactId, content || fileName, 'Ben', true, type, fileData, mime);
                    return true;
                } catch (err) {
                    queueMessage(contactId, { type, content, fileData, mime, name: fileName });
                    return false;
                }
            } else {
                queueMessage(contactId, { type, content, fileData, mime, name: fileName });
                return false;
            }
        }

        function queueMessage(contactId, msg) {
            if (!pendingMessages[contactId]) pendingMessages[contactId] = [];
            pendingMessages[contactId].push(msg);
            if (contactStatus[contactId] !== 'connected') updateContactStatus(contactId, 'pending');
            addMessageToHistory(contactId, `⏳ ${msg.content || msg.name} (beklemede)`, 'Ben', true, msg.type, msg.fileData, msg.mime, true);
        }

        function flushPendingMessages(contactId) {
            if (!pendingMessages[contactId]?.length || !currentConnection || !isConnected || activeContactId !== contactId) return;
            let pending = [...pendingMessages[contactId]];
            pendingMessages[contactId] = [];
            for (let msg of pending) {
                try {
                    let payload = { type: msg.type };
                    if (msg.type === 'text') payload.text = msg.content;
                    else { payload.name = msg.name; payload.data = msg.fileData; payload.mime = msg.mime; }
                    currentConnection.send(payload);
                    addMessageToHistory(contactId, msg.content || msg.name, 'Ben', true, msg.type, msg.fileData, msg.mime);
                } catch (err) {
                    if (!pendingMessages[contactId]) pendingMessages[contactId] = [];
                    pendingMessages[contactId].unshift(msg);
                }
            }
            if (pending.length) addSystemMessage(`${pending.length} bekleyen mesaj gönderildi.`);
        }

        function addMessageToHistory(contactId, content, sender, isSent, msgType, fileData = null, mime = '', isPending = false) {
            if (!messagesHistory[contactId]) messagesHistory[contactId] = [];
            let msg = { content, sender, isSent, msgType, fileData, mime, isPending, timestamp: Date.now() };
            messagesHistory[contactId].push(msg);
            saveMessagesHistory();
            if (activeContactId === contactId) renderMessagesForActiveContact();
            if (!isSent && activeContactId !== contactId) {
                unreadCounts[contactId] = (unreadCounts[contactId] || 0) + 1;
                renderSidebarContent();
                showNotification(`${sender}`, content.length > 30 ? content.substring(0,30)+'...' : content);
            }
        }

        function sendTextMessage() {
            if (!activeContactId) { addSystemMessage('Önce bir kişi seçin.'); return; }
            let text = elements.messageInput.value.trim();
            if (!text) return;
            sendMessageWithQueue(activeContactId, 'text', text);
            elements.messageInput.value = '';
        }

        function sendTyping() { if (currentConnection && isConnected) currentConnection.send({ type: 'typing' }); }

        let typingTimer;
        if (elements.messageInput) {
            elements.messageInput.addEventListener('input', () => {
                if (isConnected && activeContactId) { sendTyping(); clearTimeout(typingTimer); typingTimer = setTimeout(() => {}, 1000); }
            });
        }

        function renderMessagesForActiveContact() {
            if (!elements.messagesArea) return;
            elements.messagesArea.innerHTML = '';
            if (!activeContactId) {
                elements.messagesArea.innerHTML = '<div class="no-contact-selected">👈 Sağ üstten bir kişi seçin</div>';
                return;
            }
            let history = messagesHistory[activeContactId] || [];
            if (history.length === 0) {
                elements.messagesArea.innerHTML = '<div class="no-contact-selected">💬 Henüz mesaj yok</div>';
                return;
            }
            history.forEach((msg) => {
                let div = document.createElement('div');
                div.className = `message ${msg.isSent ? 'sent' : 'received'}`;
                let timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                let contentHtml = '';
                if (msg.msgType === 'text') contentHtml = `<div class="message-content">${!msg.isSent ? `<strong>${escapeHtml(msg.sender)}:</strong> ` : ''}${escapeHtml(msg.content)}</div>`;
                else if (msg.msgType === 'image') contentHtml = `<div class="message-content"><img src="${msg.fileData}" style="max-width:200px; max-height:200px; border-radius:12px; cursor:pointer;" onclick="window.open('${msg.fileData}','_blank')"></div>`;
                else if (msg.msgType === 'file') contentHtml = `<div class="message-content" style="cursor:pointer;" onclick="downloadFile('${msg.fileData}', '${msg.content}')">📎 ${escapeHtml(msg.content)}</div>`;
                div.innerHTML = contentHtml + `<div class="message-time">${timeStr}</div>`;
                elements.messagesArea.appendChild(div);
            });
            elements.messagesArea.scrollTop = elements.messagesArea.scrollHeight;
            if (unreadCounts[activeContactId]) { delete unreadCounts[activeContactId]; renderSidebarContent(); }
        }

        function updateChatHeaderStatus() {
            if (!activeContactId) {
                elements.currentChatHeader.style.display = 'none';
                return;
            }
            elements.currentChatHeader.style.display = 'flex';
            let status = contactStatus[activeContactId] || 'offline';
            let statusClass = status === 'connected' ? 'online' : (status === 'connecting' ? 'connecting' : 'offline');
            elements.chatStatusLight.className = `chat-status-light ${statusClass}`;
        }

        function updateContactStatus(id, status) { contactStatus[id] = status; renderSidebarContent(); updateChatHeaderStatus(); }

        function setConnectedState(connected) {
            isConnected = connected;
            if (elements.messageInput) elements.messageInput.disabled = !connected;
            if (elements.sendButton) elements.sendButton.disabled = !connected;
            updateChatHeaderStatus();
        }

        function showChatInterface(show) {
            if (show && activeContactId) {
                elements.inputContainer.style.display = 'block';
                elements.currentChatHeader.style.display = 'flex';
            } else if (!activeContactId) {
                elements.inputContainer.style.display = 'none';
                elements.currentChatHeader.style.display = 'none';
            }
        }

        function addSystemMessage(text) {
            if (!activeContactId) return;
            let div = document.createElement('div');
            div.className = 'message received';
            div.style.alignSelf = 'center';
            div.innerHTML = `<div class="message-content" style="background:#eef2ff; font-size:0.7rem;">📡 ${escapeHtml(text)}</div>`;
            elements.messagesArea.appendChild(div);
            elements.messagesArea.scrollTop = elements.messagesArea.scrollHeight;
        }

        function renderSidebarContent() {
            if (!elements.sidebarContent) return;
            if (currentSidebarMode === 'settings') {
                elements.sidebarTitle.innerText = '⚙️ Ayarlar';
                elements.sidebarContent.innerHTML = `
                    <div class="settings-section">
                        <div class="settings-label">📞 TELEFON NUMARANIZ</div>
                        <div class="settings-value">
                            <span>${myPhoneNumber && myPhoneNumber !== "" ? escapeHtml(myPhoneNumber) : "Henüz ayarlanmadı"}</span>
                            <button class="mini-btn primary" id="editPhoneSettingsBtn">${myPhoneNumber ? "✏️ Düzenle" : "➕ Ekle"}</button>
                        </div>
                        <div class="warning-text">⚠️ Bu numara sizin kimliğinizdir. Karşı taraf size bu numara ile bağlanır. Dilerseniz telefon numarası dışında bir ID belirleyebilirsiniz.</div>
                                            </div>
                `;
                document.getElementById('editPhoneSettingsBtn')?.addEventListener('click', () => showPhoneEditModal());
            } else {
                elements.sidebarTitle.innerText = '📒 Kişilerim';
                let contactsHtml = '<div class="contacts-list-sidebar">';
                if (contacts.length === 0) {
                    contactsHtml += '<div style="text-align:center; color:#94a3b8; padding:20px;">📭 Henüz kişi yok</div>';
                } else {
                    contacts.forEach(contact => {
                        let status = contactStatus[contact.id] || 'offline';
                        let isActive = activeContactId === contact.id;
                        let pendingCount = pendingMessages[contact.id]?.length || 0;
                        let unreadCount = unreadCounts[contact.id] || 0;
                        let isOnline = status === 'connected';
                        contactsHtml += `
                            <div class="contact-item-sidebar ${isActive ? 'active-contact' : ''}">
                                <div class="contact-info-sidebar">
                                    <div class="contact-name-sidebar">
                                        ${escapeHtml(contact.name)}
                                        ${isOnline ? '<span class="contact-badge online">● Aktif</span>' : ''}
                                        ${pendingCount ? `<span class="contact-badge pending">📬 ${pendingCount}</span>` : ''}
                                        ${unreadCount ? `<span class="contact-badge unread">🔔 ${unreadCount}</span>` : ''}
                                    </div>
                                    <div class="contact-phone-sidebar">📞 ${escapeHtml(contact.phoneNumber)}</div>
                                </div>
                                <div class="contact-actions-sidebar">
                                    <button class="contact-action-btn" data-action="connect" data-id="${contact.id}" data-phone="${contact.phoneNumber}" data-name="${escapeHtml(contact.name)}">🔌</button>
                                    <button class="contact-action-btn" data-action="delete" data-id="${contact.id}">🗑</button>
                                </div>
                            </div>
                        `;
                    });
                }
                contactsHtml += `<button class="add-contact-btn-sidebar" id="addContactSidebarBtn">+ Yeni Kişi Ekle</button></div>`;
                elements.sidebarContent.innerHTML = contactsHtml;
                
                document.querySelectorAll('[data-action="connect"]').forEach(btn => {
                    btn.onclick = () => {
                        let id = btn.dataset.id, phone = btn.dataset.phone, name = btn.dataset.name;
                        if (contactStatus[id] === 'connected') { disconnectCurrent(); updateContactStatus(id, 'offline'); }
                        else connectToContact(id, phone, name);
                        closeSidebar();
                    };
                });
                document.querySelectorAll('[data-action="delete"]').forEach(btn => {
                    btn.onclick = () => deleteContactById(btn.dataset.id);
                });
                document.getElementById('addContactSidebarBtn')?.addEventListener('click', () => {
                    closeSidebar();
                    showAddContactModal();
                });
            }
        }

        function showPhoneEditModal() {
            const modal = document.getElementById('editPhoneModal');
            const input = document.getElementById('editPhoneInput');
            input.value = myPhoneNumber || '';
            modal.style.display = 'flex';
            const saveBtn = document.getElementById('editPhoneSave');
            const cancelBtn = document.getElementById('editPhoneCancel');
            const saveHandler = () => {
                let newPhone = input.value.trim().replace(/\s/g, '');
                if (!newPhone) {
                    alert('Lütfen geçerli bir telefon numarası girin');
                    return;
                }
                savePhoneNumber(newPhone);
                modal.style.display = 'none';
                renderSidebarContent();
                saveBtn.removeEventListener('click', saveHandler);
                cancelBtn.removeEventListener('click', cancelHandler);
            };
            const cancelHandler = () => {
                modal.style.display = 'none';
                saveBtn.removeEventListener('click', saveHandler);
                cancelBtn.removeEventListener('click', cancelHandler);
            };
            saveBtn.addEventListener('click', saveHandler);
            cancelBtn.addEventListener('click', cancelHandler);
        }

        function showAddContactModal() {
            const modal = document.getElementById('contactModal');
            const nameInput = document.getElementById('contactNameInput');
            const phoneInput = document.getElementById('contactPhoneInput');
            nameInput.value = '';
            phoneInput.value = '';
            modal.style.display = 'flex';
            const saveBtn = document.getElementById('modalSaveBtn');
            const cancelBtn = document.getElementById('modalCancelBtn');
            const saveHandler = () => {
                let name = nameInput.value.trim();
                let phone = phoneInput.value.trim().replace(/\s/g, '');
                if (!name || !phone) { alert('Lütfen tüm bilgileri doldurun'); return; }
                if (contacts.some(c => c.phoneNumber === phone)) { alert('Bu telefon numarası zaten mevcut'); return; }
                if (phone === myPhoneNumber) { alert('Kendi numaranızı ekleyemezsiniz'); return; }
                let newId = Date.now() + '_' + Math.random().toString(36);
                contacts.push({ id: newId, name, phoneNumber: phone });
                contactStatus[newId] = 'offline';
                pendingMessages[newId] = [];
                saveContacts();
                renderSidebarContent();
                modal.style.display = 'none';
                saveBtn.removeEventListener('click', saveHandler);
                cancelBtn.removeEventListener('click', cancelHandler);
            };
            const cancelHandler = () => {
                modal.style.display = 'none';
                saveBtn.removeEventListener('click', saveHandler);
                cancelBtn.removeEventListener('click', cancelHandler);
            };
            saveBtn.addEventListener('click', saveHandler);
            cancelBtn.addEventListener('click', cancelHandler);
        }

        function deleteContactById(id) {
            if (confirm('Kişiyi silmek mesaj geçmişini ve bekleyen mesajları siler.')) {
                if (activeContactId === id) {
                    if (currentConnection) currentConnection.close();
                    activeContactId = null;
                    activeContactName = "";
                    elements.currentChatName.innerText = "Seçili kişi yok";
                    setConnectedState(false);
                    renderMessagesForActiveContact();
                    showChatInterface(false);
                }
                contacts = contacts.filter(c => c.id !== id);
                delete contactStatus[id];
                delete pendingMessages[id];
                delete messagesHistory[id];
                delete unreadCounts[id];
                saveContacts();
                saveMessagesHistory();
                renderSidebarContent();
                updateChatHeaderStatus();
            }
        }

        function saveContacts() { localStorage.setItem('seyficet_contacts_v2', JSON.stringify(contacts)); }
        function saveMessagesHistory() { localStorage.setItem('seyficet_messages_v2', JSON.stringify(messagesHistory)); }
        function loadContacts() {
            let stored = localStorage.getItem('seyficet_contacts_v2');
            contacts = stored ? JSON.parse(stored) : [];
            contacts.forEach(c => { if (!contactStatus[c.id]) contactStatus[c.id] = 'offline'; if (!pendingMessages[c.id]) pendingMessages[c.id] = []; });
            renderSidebarContent();
        }
        function loadMessagesHistory() {
            let stored = localStorage.getItem('seyficet_messages_v2');
            messagesHistory = stored ? JSON.parse(stored) : {};
        }

        function sendWithProgress(file, type, callback) {
            const reader = new FileReader();
            reader.onload = (e) => {
                callback(100);
                sendMessageWithQueue(activeContactId, type, '', e.target.result, file.type, file.name);
            };
            reader.readAsDataURL(file);
        }

        window.downloadFile = (url, name) => { let a = document.createElement('a'); a.href = url; a.download = name; a.click(); };

        elements.emojiBtn.onclick = () => {
            if (emojiPicker) { emojiPicker.remove(); emojiPicker = null; return; }
            emojiPicker = document.createElement('div'); emojiPicker.className = 'emoji-picker';
            let emojis = ['😀','😂','🥰','😎','😢','😡','👍','❤️','🔥','🎉','🙏','💯','✨','🍕','☕','🏆','😍','🥺','🤣','💪'];
            emojis.forEach(e => { let span = document.createElement('span'); span.textContent = e; span.onclick = () => { sendMessageWithQueue(activeContactId, 'text', e); emojiPicker.remove(); emojiPicker = null; }; emojiPicker.appendChild(span); });
            document.body.appendChild(emojiPicker);
        };
        elements.fileBtn.onclick = () => { let input = document.createElement('input'); input.type = 'file'; input.onchange = (e) => { if (e.target.files[0]) sendWithProgress(e.target.files[0], 'file', (p) => {}); }; input.click(); };
        elements.imageBtn.onclick = () => { let input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = (e) => { if (e.target.files[0]) sendWithProgress(e.target.files[0], 'image', (p) => {}); }; input.click(); };
        
        elements.sendButton.onclick = sendTextMessage;
        if (elements.messageInput) elements.messageInput.onkeypress = (e) => { if (e.key === 'Enter' && activeContactId) sendTextMessage(); };
        elements.settingsBtn.onclick = () => openSidebar('settings');
        elements.contactsBtn.onclick = () => openSidebar('contacts');
        elements.closeSidebar.onclick = closeSidebar;
        function closeSidebar() { elements.sidebar.classList.remove('open'); }
        function openSidebar(mode) { currentSidebarMode = mode; renderSidebarContent(); elements.sidebar.classList.add('open'); }
        
        if (Notification.permission === 'default') Notification.requestPermission();
        
        loadContacts();
        loadMessagesHistory();
        const hasPhone = loadPhoneNumber();
        if (hasPhone) initPeer();
        else updateStatus('⚠️ Lütfen ayarlardan telefon numaranızı girin', true);
        renderMessagesForActiveContact();
        showChatInterface(false);
    </script>
</body>
</html>
