<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2P Anlık Mesajlaşma - Kişilerim</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }

        .chat-header {
            background: #4a90e2;
            color: white;
            padding: 12px 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .chat-header h1 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .connection-status {
            font-size: 0.7rem;
            margin-top: 4px;
            color: #f0f0f0;
        }

        /* Kişi paneli - kalıcı kişiler */
        .contacts-panel {
            background: #f8f9fc;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
        }

        .my-info {
            padding: 10px 16px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
        }

        .my-id-label {
            font-size: 0.65rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .my-id-value {
            font-family: monospace;
            font-size: 0.7rem;
            background: #f1f5f9;
            padding: 6px 10px;
            border-radius: 10px;
            word-break: break-all;
            margin-top: 4px;
            color: #1e293b;
        }

        .contacts-header {
            padding: 12px 16px 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .contacts-title {
            font-weight: 600;
            color: #1e293b;
            font-size: 0.85rem;
        }

        .add-contact-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
        }

        .add-contact-btn:active {
            transform: scale(0.96);
        }

        .contacts-list {
            max-height: 140px;
            overflow-y: auto;
            padding: 0 12px 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .contact-item {
            background: white;
            border-radius: 14px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.1s;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #0f172a;
            word-break: break-word;
        }

        .contact-peerid {
            font-family: monospace;
            font-size: 0.65rem;
            color: #64748b;
            margin-top: 2px;
            word-break: break-all;
        }

        .contact-actions {
            display: flex;
            gap: 8px;
            margin-left: 10px;
        }

        .contact-actions button {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 20px;
            transition: background 0.1s;
        }

        .connect-contact-btn {
            background: #e6f7e6;
            color: #2e7d32;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .connect-contact-btn:active {
            background: #c8e6c9;
        }

        .delete-contact-btn {
            color: #ef4444;
            font-size: 1rem;
        }

        .delete-contact-btn:active {
            background: #fee2e2;
        }

        /* Modal (kişi ekleme) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: white;
            width: 85%;
            max-width: 320px;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }

        .modal-content h3 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: #0f172a;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;
            border: 1px solid #cbd5e1;
            border-radius: 24px;
            font-size: 0.9rem;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 30px;
            border: none;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-save {
            background: #4a90e2;
            color: white;
        }

        .modal-cancel {
            background: #e2e8f0;
            color: #334155;
        }

        /* Mesaj alanı */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            background: #f1f5f9;
            display: flex;
            flex-direction: column;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.sent {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.received {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-content {
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .sent .message-content {
            background: #4a90e2;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .message-content {
            background: white;
            color: #1e293b;
            border: 0.5px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.65rem;
            color: #64748b;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
        }

        .current-chat-info {
            padding: 8px 16px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
            border-bottom: 1px solid #eef2f6;
            font-size: 0.8rem;
            font-weight: 500;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .current-chat-name {
            color: #4a90e2;
            font-weight: 600;
        }

        .input-area {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #edf2f7;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            outline: none;
            font-size: 1rem;
        }

        #sendButton {
            padding: 12px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        #sendButton:disabled {
            background: #b9c8f0;
            cursor: not-allowed;
        }

        button:active {
            transform: scale(0.97);
        }

        @media (max-width: 480px) {
            .contacts-list {
                max-height: 120px;
            }
            .contact-name {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>💬 P2P Mesajlaşma</h1>
            <div class="connection-status" id="status">Bağlantı bekleniyor...</div>
        </div>

        <!-- Kişi paneli - localStorage ile kalıcı -->
        <div class="contacts-panel">
            <div class="my-info">
                <div class="my-id-label">🔑 SİZİN ID'NİZ</div>
                <div class="my-id-value" id="myPeerId">Bağlanıyor...</div>
            </div>
            <div class="contacts-header">
                <span class="contacts-title">📒 KİŞİLERİM (kalıcı)</span>
                <button class="add-contact-btn" id="addContactBtn">+ Yeni Kişi</button>
            </div>
            <div class="contacts-list" id="contactsList">
                <!-- kişiler dinamik listelenecek -->
                <div style="text-align:center; color:#94a3b8; padding:12px;">Henüz kişi eklenmemiş</div>
            </div>
        </div>

        <!-- Aktif sohbet bilgisi -->
        <div class="current-chat-info" id="currentChatInfo">
            💬 Sohbet: <span id="activeContactName" class="current-chat-name">Seçili kişi yok</span>
        </div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Mesaj yaz..." disabled>
            <button id="sendButton" disabled>Gönder</button>
        </div>
    </div>

    <!-- Modal: kişi ekleme -->
    <div id="contactModal" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h3>➕ Yeni Kişi Ekle</h3>
            <input type="text" id="contactNameInput" placeholder="Kişi adı (ör: Ahmet Yılmaz)" autocomplete="off">
            <input type="text" id="contactPeerIdInput" placeholder="Karşı tarafın Peer ID'si" autocomplete="off">
            <div class="modal-buttons">
                <button class="modal-cancel" id="modalCancelBtn">Vazgeç</button>
                <button class="modal-save" id="modalSaveBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        // ---------- KALICI KİŞİLER (localStorage) ----------
        let contacts = []; // { id, name, peerId }
        let activeContactId = null;      // Şu an mesajlaşılan kişinin id'si
        let activeContactPeerId = null;
        let activeContactName = "";

        // PeerJS değişkenleri
        let peer;
        let currentConnection = null;   // aktif bağlantı
        let isConnected = false;

        // DOM elementleri
        const contactsListDiv = document.getElementById('contactsList');
        const addContactBtn = document.getElementById('addContactBtn');
        const modal = document.getElementById('contactModal');
        const contactNameInput = document.getElementById('contactNameInput');
        const contactPeerIdInput = document.getElementById('contactPeerIdInput');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalSaveBtn = document.getElementById('modalSaveBtn');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusDiv = document.getElementById('status');
        const myPeerIdDiv = document.getElementById('myPeerId');
        const activeContactNameSpan = document.getElementById('activeContactName');

        // Mesaj geçmişi: her kişi için ayrı (localStorage'da tutulacak)
        let messagesHistory = {}; // { contactId: [ {text, sender, timestamp, isSent} ] }

        // Yardım: localStorage'dan yükleme
        function loadContacts() {
            const stored = localStorage.getItem('p2p_contacts');
            if (stored) {
                try {
                    contacts = JSON.parse(stored);
                } catch(e) { contacts = []; }
            } else {
                contacts = [];
            }
            // Örnek demo kişi ekleme (ilk kez açan için örnek, amaç göstermek)
            if (contacts.length === 0) {
                // Tamamen boşsa hiç ekleme, kullanıcı kendi eklesin. Ama isteğe bağlı örnek yok.
            }
            renderContactsList();
        }

        function saveContacts() {
            localStorage.setItem('p2p_contacts', JSON.stringify(contacts));
        }

        function loadMessagesHistory() {
            const storedMsg = localStorage.getItem('p2p_messages_history');
            if (storedMsg) {
                try {
                    messagesHistory = JSON.parse(storedMsg);
                } catch(e) { messagesHistory = {}; }
            } else {
                messagesHistory = {};
            }
        }

        function saveMessagesHistory() {
            localStorage.setItem('p2p_messages_history', JSON.stringify(messagesHistory));
        }

        // Belirli bir kişi için mesaj geçmişini güncelleme
        function addMessageToHistory(contactId, messageObj) {
            if (!messagesHistory[contactId]) messagesHistory[contactId] = [];
            messagesHistory[contactId].push(messageObj);
            saveMessagesHistory();
        }

        // Mesajları ekrana bas (aktif kişiye göre)
        function renderMessagesForActiveContact() {
            messagesArea.innerHTML = '';
            if (!activeContactId) {
                // boş mesaj alanı
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'message received';
                emptyDiv.style.alignSelf = 'center';
                emptyDiv.style.opacity = '0.7';
                emptyDiv.innerHTML = `<div class="message-content" style="background:#e2e8f0;">👈 Sol taraftan bir kişi seçin</div>`;
                messagesArea.appendChild(emptyDiv);
                return;
            }
            const history = messagesHistory[activeContactId] || [];
            history.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.isSent ? 'sent' : 'received'}`;
                const timeStr = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
                const displaySender = msg.isSent ? 'Ben' : (msg.senderName || activeContactName);
                msgDiv.innerHTML = `
                    <div class="message-content">
                        ${!msg.isSent ? `<strong>${escapeHtml(displaySender)}:</strong> ` : ''}
                        ${escapeHtml(msg.text)}
                    </div>
                    <div class="message-time">${timeStr}</div>
                `;
                messagesArea.appendChild(msgDiv);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Yeni mesaj geldiğinde (gerçek zamanlı veya manuel ekleme)
        function addMessageToUIAndHistory(contactId, text, senderName, isSent, remoteSide = false) {
            const messageObj = {
                text: text,
                senderName: senderName,
                timestamp: Date.now(),
                isSent: isSent
            };
            addMessageToHistory(contactId, messageObj);
            // eğer aktif sohbet bu kişi ise UI'ı güncelle
            if (activeContactId === contactId) {
                renderMessagesForActiveContact();
            }
        }

        // Sistem mesajı (sohbet alanına)
        function addSystemMessageToActive(text) {
            if (!activeContactId) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message received';
            msgDiv.style.alignSelf = 'center';
            msgDiv.style.maxWidth = '85%';
            msgDiv.innerHTML = `<div class="message-content" style="background:#eef2ff; color:#334155; font-size:0.75rem; padding:6px 12px;">📡 ${escapeHtml(text)}</div>`;
            messagesArea.appendChild(msgDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            // sistem mesajlarını kaydetme (isteğe bağlı, tutmak istersen history ekleyebiliriz ama konuşma dışı)
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // Kişi listesini render et
        function renderContactsList() {
            if (!contactsListDiv) return;
            if (contacts.length === 0) {
                contactsListDiv.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:12px;">📭 Henüz kişi yok, + ile ekleyin</div>';
                return;
            }
            contactsListDiv.innerHTML = '';
            contacts.forEach(contact => {
                const contactDiv = document.createElement('div');
                contactDiv.className = 'contact-item';
                contactDiv.dataset.id = contact.id;
                contactDiv.innerHTML = `
                    <div class="contact-info">
                        <div class="contact-name">${escapeHtml(contact.name)}</div>
                        <div class="contact-peerid">${escapeHtml(contact.peerId.substring(0, 12))}...</div>
                    </div>
                    <div class="contact-actions">
                        <button class="connect-contact-btn" data-id="${contact.id}" data-peer="${contact.peerId}" data-name="${escapeHtml(contact.name)}">🔗 Bağlan</button>
                        <button class="delete-contact-btn" data-id="${contact.id}">🗑</button>
                    </div>
                `;
                contactsListDiv.appendChild(contactDiv);
            });
            // event listener ekle
            document.querySelectorAll('.connect-contact-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    const peerId = btn.dataset.peer;
                    const name = btn.dataset.name;
                    selectAndConnectToContact(id, peerId, name);
                });
            });
            document.querySelectorAll('.delete-contact-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    deleteContactById(id);
                });
            });
        }

        function selectAndConnectToContact(contactId, peerId, name) {
            // aktif kişiyi güncelle
            activeContactId = contactId;
            activeContactPeerId = peerId;
            activeContactName = name;
            activeContactNameSpan.innerText = name;
            // mesaj geçmişini göster
            renderMessagesForActiveContact();
            // mevcut bağlantı varsa kapat ve yeni bağlantı kur
            if (currentConnection) {
                currentConnection.close();
                currentConnection = null;
                isConnected = false;
                setConnectedState(false);
            }
            // bağlanma dene
            initiateConnectionToPeer(peerId, name);
        }

        function deleteContactById(contactId) {
            if (confirm('Kişiyi silmek tüm mesaj geçmişini de siler. Devam et?')) {
                contacts = contacts.filter(c => c.id !== contactId);
                saveContacts();
                // mesaj geçmişini de sil
                if (messagesHistory[contactId]) {
                    delete messagesHistory[contactId];
                    saveMessagesHistory();
                }
                if (activeContactId === contactId) {
                    activeContactId = null;
                    activeContactPeerId = null;
                    activeContactName = "";
                    activeContactNameSpan.innerText = "Seçili kişi yok";
                    if (currentConnection) {
                        currentConnection.close();
                        currentConnection = null;
                        isConnected = false;
                        setConnectedState(false);
                    }
                    renderMessagesForActiveContact();
                }
                renderContactsList();
            }
        }

        function setConnectedState(connected) {
            isConnected = connected;
            messageInput.disabled = !connected;
            sendButton.disabled = !connected;
            if (connected) {
                statusDiv.innerHTML = '✅ Bağlantı kuruldu! Mesajlaşabilirsiniz.';
                statusDiv.style.color = '#d1fae5';
            } else {
                statusDiv.innerHTML = '❌ Bağlantı kesildi. Tekrar bağlanın.';
                statusDiv.style.color = '#fed7d7';
            }
        }

        function initiateConnectionToPeer(peerId, contactName) {
            if (!peer) return;
            if (currentConnection) {
                currentConnection.close();
                currentConnection = null;
            }
            statusDiv.innerHTML = `🔄 ${contactName} bağlanıyor...`;
            const newConn = peer.connect(peerId);
            if (!newConn) return;
            currentConnection = newConn;
            setupConnectionEvents(currentConnection, contactName);
            // timeout kontrolü
            setTimeout(() => {
                if (currentConnection === newConn && !isConnected) {
                    addSystemMessageToActive(`${contactName} bağlantı zaman aşımı, ID kontrol edin.`);
                    statusDiv.innerHTML = '❌ Bağlantı başarısız';
                    setConnectedState(false);
                }
            }, 10000);
        }

        function setupConnectionEvents(connection, contactName) {
            connection.on('open', () => {
                setConnectedState(true);
                statusDiv.innerHTML = `✅ ${contactName} ile bağlantı aktif`;
                addSystemMessageToActive(`${contactName} ile görüşmeye hazırsınız.`);
            });
            connection.on('data', (data) => {
                if (data && data.text) {
                    // gelen mesaj
                    if (activeContactId) {
                        addMessageToUIAndHistory(activeContactId, data.text, contactName, false);
                    } else {
                        // aktif kişi yoksa ama yine de kaydetmek için? bu durumda ilgili kişi aktif olmalı
                        if (activeContactId) addMessageToUIAndHistory(activeContactId, data.text, contactName, false);
                    }
                }
            });
            connection.on('close', () => {
                if (currentConnection === connection) {
                    addSystemMessageToActive(`${contactName} bağlantıyı kapattı.`);
                    setConnectedState(false);
                    currentConnection = null;
                }
            });
            connection.on('error', (err) => {
                if (currentConnection === connection) {
                    addSystemMessageToActive(`${contactName} bağlantı hatası: ${err.message || 'bağlantı sorunu'}`);
                    setConnectedState(false);
                    currentConnection = null;
                }
            });
        }

        // Mesaj gönderme fonksiyonu (aktif kişiye)
        function sendMessageToActive() {
            if (!isConnected || !currentConnection || !activeContactId) {
                addSystemMessageToActive('Önce bir kişi seçip bağlanmalısınız.');
                return;
            }
            const text = messageInput.value.trim();
            if (!text) return;
            const payload = { text: text, sender: activeContactName, timestamp: Date.now() };
            currentConnection.send(payload);
            // mesajı kendi geçmişe ekle
            addMessageToUIAndHistory(activeContactId, text, 'Ben', true);
            messageInput.value = '';
            messageInput.focus();
        }

        // Yeni kişi ekleme modal
        function showModal() {
            contactNameInput.value = '';
            contactPeerIdInput.value = '';
            modal.style.display = 'flex';
        }
        function hideModal() {
            modal.style.display = 'none';
        }
        function saveNewContact() {
            const name = contactNameInput.value.trim();
            const peerId = contactPeerIdInput.value.trim();
            if (!name || !peerId) {
                alert('Lütfen ad ve Peer ID girin');
                return;
            }
            // aynı peerId var mı kontrol
            if (contacts.some(c => c.peerId === peerId)) {
                alert('Bu Peer ID zaten kişilerinizde mevcut.');
                return;
            }
            const newId = Date.now().toString() + Math.random().toString(36);
            const newContact = { id: newId, name: name, peerId: peerId };
            contacts.push(newContact);
            saveContacts();
            renderContactsList();
            hideModal();
        }

        // PeerJS başlatma
        function initPeer() {
            peer = new Peer({
                debug: 0,
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });
            peer.on('open', (id) => {
                myPeerIdDiv.innerText = id;
                statusDiv.innerHTML = '✅ Hazır, kişi ekleyip bağlanabilirsiniz.';
            });
            peer.on('connection', (incomingConn) => {
                // Gelen bağlantıyı kabul et, eğer bu kişi rehberde var mı kontrol et
                const remotePeerId = incomingConn.peer;
                const contact = contacts.find(c => c.peerId === remotePeerId);
                if (!contact) {
                    // tanınmayan peer, otomatik reddet veya isteğe bağlı ekleme sor
                    incomingConn.close();
                    addSystemMessageToActive('Tanınmayan bir bağlantı isteği reddedildi.');
                    return;
                }
                if (currentConnection) currentConnection.close();
                currentConnection = incomingConn;
                activeContactId = contact.id;
                activeContactPeerId = contact.peerId;
                activeContactName = contact.name;
                activeContactNameSpan.innerText = contact.name;
                renderMessagesForActiveContact();
                setupConnectionEvents(currentConnection, contact.name);
                addSystemMessageToActive(`${contact.name} sizinle bağlantı kurdu.`);
                setConnectedState(true);
            });
            peer.on('error', (err) => {
                console.warn(err);
                statusDiv.innerHTML = '⚠️ Peer bağlantı hatası';
            });
        }

        // Event listeners
        addContactBtn.addEventListener('click', showModal);
        modalCancelBtn.addEventListener('click', hideModal);
        modalSaveBtn.addEventListener('click', saveNewContact);
        sendButton.addEventListener('click', sendMessageToActive);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && isConnected && activeContactId) sendMessageToActive();
        });
        // Modal dışına tıklayınca kapatma
        window.addEventListener('click', (e) => {
            if (e.target === modal) hideModal();
        });

        // Uygulama başlangıcı
        loadContacts();
        loadMessagesHistory();
        initPeer();
        // Başlangıçta aktif yok
        activeContactId = null;
        renderMessagesForActiveContact();
    </script>
</body>
</html>
