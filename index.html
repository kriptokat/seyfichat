<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SEYFİÇET - P2P Mesajlaşma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }

        /* Üst başlık alanı - SEYFİÇET logosu + P2P yazısı */
        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .logo-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .header-text {
            flex: 1;
        }

        .app-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            line-height: 1.2;
        }

        .sub-title {
            font-size: 0.7rem;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        .chat-header {
            background: #4a90e2;
            color: white;
            padding: 8px 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .connection-status {
            font-size: 0.65rem;
            margin-top: 3px;
            color: #f0f0f0;
        }

        /* Kişi paneli */
        .contacts-panel {
            background: #f8f9fc;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
        }

        .my-info {
            padding: 8px 12px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .my-id-box {
            flex: 1;
            min-width: 0;
        }

        .my-id-label {
            font-size: 0.6rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .my-id-value {
            font-family: monospace;
            font-size: 0.65rem;
            background: #f1f5f9;
            padding: 5px 8px;
            border-radius: 8px;
            word-break: break-all;
            margin-top: 3px;
            color: #1e293b;
        }

        .copy-id-btn {
            background: #e2e8f0;
            border: none;
            padding: 6px 12px;
            border-radius: 25px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #334155;
            cursor: pointer;
            white-space: nowrap;
        }

        .copy-id-btn:active {
            background: #cbd5e1;
            transform: scale(0.96);
        }

        .contacts-header {
            padding: 10px 12px 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .contacts-title {
            font-weight: 600;
            color: #1e293b;
            font-size: 0.8rem;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .add-contact-btn, .clear-messages-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 18px;
            font-size: 0.65rem;
            font-weight: 500;
            cursor: pointer;
        }

        .clear-messages-btn {
            background: #f59e0b;
        }

        .clear-messages-btn:active {
            background: #d97706;
            transform: scale(0.96);
        }

        .add-contact-btn:active {
            transform: scale(0.96);
        }

        .contacts-list {
            max-height: 130px;
            overflow-y: auto;
            padding: 0 10px 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .contact-item {
            background: white;
            border-radius: 12px;
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #0f172a;
            word-break: break-word;
        }

        .contact-peerid {
            font-family: monospace;
            font-size: 0.6rem;
            color: #64748b;
            margin-top: 2px;
            word-break: break-all;
        }

        .contact-actions {
            display: flex;
            gap: 6px;
            margin-left: 8px;
        }

        .contact-actions button {
            background: none;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 18px;
            font-weight: 500;
        }

        .connect-contact-btn {
            background: #e6f7e6;
            color: #2e7d32;
            font-size: 0.65rem;
            padding: 4px 10px;
        }

        .connect-contact-btn:active {
            background: #c8e6c9;
        }

        .delete-contact-btn {
            color: #ef4444;
            font-size: 0.9rem;
            padding: 4px 6px;
        }

        .delete-contact-btn:active {
            background: #fee2e2;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: white;
            width: 85%;
            max-width: 320px;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }

        .modal-content h3 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: #0f172a;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;
            border: 1px solid #cbd5e1;
            border-radius: 24px;
            font-size: 0.9rem;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 30px;
            border: none;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-save {
            background: #4a90e2;
            color: white;
        }

        .modal-cancel {
            background: #e2e8f0;
            color: #334155;
        }

        /* Emoji seçici */
        .emoji-picker {
            position: absolute;
            bottom: 70px;
            left: 10px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            z-index: 100;
            max-width: 280px;
            border: 1px solid #e2e8f0;
        }
        .emoji-picker span {
            font-size: 1.5rem;
            cursor: pointer;
            text-align: center;
            padding: 5px;
            border-radius: 10px;
        }
        .emoji-picker span:active {
            background: #e2e8f0;
        }

        /* Mesaj alanı */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px;
            background: #f1f5f9;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.sent {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.received {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-content {
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .sent .message-content {
            background: #4a90e2;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .message-content {
            background: white;
            color: #1e293b;
            border: 0.5px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .message-content.file-message {
            background: #eef2ff;
            cursor: pointer;
        }
        .sent .message-content.file-message {
            background: #3b82f6;
        }
        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .message-time {
            font-size: 0.6rem;
            color: #64748b;
            margin-top: 3px;
            margin-left: 6px;
            margin-right: 6px;
        }

        .current-chat-info {
            padding: 6px 12px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
            border-bottom: 1px solid #eef2f6;
            font-size: 0.75rem;
            font-weight: 500;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .current-chat-name {
            color: #4a90e2;
            font-weight: 600;
        }

        /* Input alanı - butonlar düzenli */
        .input-area {
            padding: 10px 12px;
            background: white;
            border-top: 1px solid #edf2f7;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            position: relative;
        }

        .input-buttons {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            background: #f1f5f9;
            border: none;
            padding: 8px 12px;
            border-radius: 28px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.1s;
        }

        .icon-btn:active {
            transform: scale(0.95);
            background: #e2e8f0;
        }

        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 28px;
            outline: none;
            font-size: 0.95rem;
            background: #ffffff;
        }

        #sendButton {
            padding: 10px 18px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 28px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
        }

        #sendButton:active {
            transform: scale(0.96);
        }

        #sendButton:disabled {
            background: #b9c8f0;
            cursor: not-allowed;
        }

        .retry-badge {
            font-size: 0.6rem;
            margin-left: 6px;
            background: #ff9800;
            padding: 2px 6px;
            border-radius: 16px;
            color: white;
        }

        @media (max-width: 480px) {
            .contacts-list { max-height: 115px; }
            .icon-btn { padding: 6px 10px; font-size: 1rem; }
            #sendButton { padding: 10px 14px; min-width: 60px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- SEYFİÇET başlığı + logo + P2P yazısı -->
        <div class="app-header">
            <div class="logo-icon">💬</div>
            <div class="header-text">
                <h2>SEYFİÇET</h2>
                <div class="sub-title">
                    <span>🔒 P2P Mesajlaşma</span>
                </div>
            </div>
        </div>
        
        <div class="chat-header">
            <div class="connection-status" id="status">Bağlantı bekleniyor...</div>
        </div>

        <div class="contacts-panel">
            <div class="my-info">
                <div class="my-id-box">
                    <div class="my-id-label">🔑 KALICI ID'NİZ</div>
                    <div class="my-id-value" id="myPeerId">Bağlanıyor...</div>
                </div>
                <button class="copy-id-btn" id="copyIdBtn">📋 Kopyala</button>
            </div>
            <div class="contacts-header">
                <span class="contacts-title">📒 KİŞİLERİM</span>
                <div class="action-buttons">
                    <button class="clear-messages-btn" id="clearMessagesBtn">🗑 Mesajları Sil</button>
                    <button class="add-contact-btn" id="addContactBtn">+ Yeni Kişi</button>
                </div>
            </div>
            <div class="contacts-list" id="contactsList">
                <div style="text-align:center; color:#94a3b8; padding:10px;">Henüz kişi eklenmemiş</div>
            </div>
        </div>

        <div class="current-chat-info" id="currentChatInfo">
            💬 Sohbet: <span id="activeContactName" class="current-chat-name">Seçili kişi yok</span>
            <span id="connectionRetryBadge" style="display:none;" class="retry-badge">🔄 Yeniden bağlanıyor...</span>
        </div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="input-area">
            <div class="input-buttons">
                <button class="icon-btn" id="emojiBtn" title="Emoji">😊</button>
                <button class="icon-btn" id="fileBtn" title="Dosya">📎</button>
                <button class="icon-btn" id="imageBtn" title="Resim">🖼️</button>
            </div>
            <input type="text" id="messageInput" placeholder="Mesaj yaz..." disabled>
            <button id="sendButton" disabled>Gönder</button>
        </div>
    </div>

    <!-- Modal: kişi ekleme -->
    <div id="contactModal" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h3>➕ Yeni Kişi Ekle</h3>
            <input type="text" id="contactNameInput" placeholder="Kişi adı" autocomplete="off">
            <input type="text" id="contactPeerIdInput" placeholder="Karşı tarafın Peer ID'si" autocomplete="off">
            <div class="modal-buttons">
                <button class="modal-cancel" id="modalCancelBtn">Vazgeç</button>
                <button class="modal-save" id="modalSaveBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        // ============ KALICI ID VE VERİLER ============
        let myPermanentId = null;
        let peer = null;
        let currentConnection = null;
        let isConnected = false;
        let activeContactId = null;
        let activeContactPeerId = null;
        let activeContactName = "";
        let reconnectTimer = null;
        let isManualDisconnect = false;
        let emojiPicker = null;

        let contacts = [];
        let messagesHistory = {};

        // DOM
        const myPeerIdDiv = document.getElementById('myPeerId');
        const copyIdBtn = document.getElementById('copyIdBtn');
        const contactsListDiv = document.getElementById('contactsList');
        const addContactBtn = document.getElementById('addContactBtn');
        const clearMessagesBtn = document.getElementById('clearMessagesBtn');
        const modal = document.getElementById('contactModal');
        const contactNameInput = document.getElementById('contactNameInput');
        const contactPeerIdInput = document.getElementById('contactPeerIdInput');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalSaveBtn = document.getElementById('modalSaveBtn');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusDiv = document.getElementById('status');
        const activeContactNameSpan = document.getElementById('activeContactName');
        const connectionRetryBadge = document.getElementById('connectionRetryBadge');
        const emojiBtn = document.getElementById('emojiBtn');
        const fileBtn = document.getElementById('fileBtn');
        const imageBtn = document.getElementById('imageBtn');

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function getOrCreatePermanentId() {
            let savedId = localStorage.getItem('p2p_my_permanent_id');
            if (savedId && savedId.trim() !== "") return savedId;
            const newId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
            localStorage.setItem('p2p_my_permanent_id', newId);
            return newId;
        }

        function initPeerWithPermanentId() {
            myPermanentId = getOrCreatePermanentId();
            myPeerIdDiv.textContent = myPermanentId;
            peer = new Peer(myPermanentId, {
                debug: 0,
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });
            peer.on('open', (id) => { if (id === myPermanentId) statusDiv.innerHTML = '✅ Kalıcı ID aktif!'; });
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    localStorage.removeItem('p2p_my_permanent_id');
                    myPermanentId = getOrCreatePermanentId();
                    peer.destroy();
                    initPeerWithPermanentId();
                }
            });
            peer.on('disconnected', () => { if (!isManualDisconnect) peer.reconnect(); });
            peer.on('connection', handleIncomingConnection);
        }

        function handleIncomingConnection(incomingConn) {
            const contact = contacts.find(c => c.peerId === incomingConn.peer);
            if (!contact) { incomingConn.close(); return; }
            if (currentConnection) currentConnection.close();
            currentConnection = incomingConn;
            activeContactId = contact.id;
            activeContactPeerId = contact.peerId;
            activeContactName = contact.name;
            activeContactNameSpan.textContent = contact.name;
            renderMessagesForActiveContact();
            setupConnectionEvents(currentConnection, contact.name);
            addSystemMessage(`${contact.name} sizinle bağlantı kurdu.`);
            setConnectedState(true);
        }

        function setupConnectionEvents(connection, contactName) {
            connection.on('open', () => {
                setConnectedState(true);
                statusDiv.innerHTML = `✅ ${contactName} ile bağlantı aktif`;
                addSystemMessage(`${contactName} ile görüşmeye hazırsınız.`);
                hideRetryBadge();
                if (reconnectTimer) clearTimeout(reconnectTimer);
            });
            connection.on('data', (data) => {
                if (activeContactId) {
                    if (data.type === 'text') {
                        addMessageToHistory(activeContactId, data.text, contactName, false, 'text');
                    } else if (data.type === 'file') {
                        addMessageToHistory(activeContactId, data.name || 'Dosya', contactName, false, 'file', data.data, data.mime);
                    } else if (data.type === 'image') {
                        addMessageToHistory(activeContactId, data.name || 'Resim', contactName, false, 'image', data.data, data.mime);
                    }
                }
            });
            connection.on('close', () => {
                if (currentConnection === connection) {
                    addSystemMessage(`${contactName} bağlantıyı kapattı.`);
                    setConnectedState(false);
                    currentConnection = null;
                    scheduleReconnect();
                }
            });
            connection.on('error', () => {
                if (currentConnection === connection) {
                    setConnectedState(false);
                    currentConnection = null;
                    scheduleReconnect();
                }
            });
        }

        function scheduleReconnect() {
            if (!activeContactId || isManualDisconnect) return;
            if (reconnectTimer) clearTimeout(reconnectTimer);
            showRetryBadge();
            reconnectTimer = setTimeout(() => {
                if (!isConnected && activeContactId) {
                    const contact = contacts.find(c => c.id === activeContactId);
                    if (contact) initiateConnectionToPeer(contact.peerId, contact.name);
                }
                hideRetryBadge();
            }, 3000);
        }

        function initiateConnectionToPeer(peerId, contactName) {
            if (!peer) return;
            if (currentConnection) currentConnection.close();
            isManualDisconnect = false;
            const newConn = peer.connect(peerId);
            if (!newConn) return;
            currentConnection = newConn;
            setupConnectionEvents(currentConnection, contactName);
            setTimeout(() => {
                if (currentConnection === newConn && !isConnected) scheduleReconnect();
            }, 10000);
        }

        function setConnectedState(connected) {
            isConnected = connected;
            messageInput.disabled = !connected;
            sendButton.disabled = !connected;
        }

        function showRetryBadge() { if (connectionRetryBadge) connectionRetryBadge.style.display = 'inline-block'; }
        function hideRetryBadge() { if (connectionRetryBadge) connectionRetryBadge.style.display = 'none'; }

        // Mesaj gönderme
        function sendTextMessage() {
            if (!isConnected || !currentConnection || !activeContactId) {
                addSystemMessage('Önce bir kişi seçip bağlanın.');
                return;
            }
            const text = messageInput.value.trim();
            if (!text) return;
            currentConnection.send({ type: 'text', text: text });
            addMessageToHistory(activeContactId, text, 'Ben', true, 'text');
            messageInput.value = '';
        }

        function sendFile(file, type) {
            if (!isConnected || !currentConnection || !activeContactId) {
                addSystemMessage('Bağlantı yok, dosya gönderilemez.');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = e.target.result;
                const payload = {
                    type: type,
                    name: file.name,
                    data: data,
                    mime: file.type
                };
                currentConnection.send(payload);
                addMessageToHistory(activeContactId, file.name, 'Ben', true, type, data, file.type);
            };
            reader.readAsDataURL(file);
        }

        // Veri yönetimi
        function loadContacts() {
            const stored = localStorage.getItem('p2p_contacts_v2');
            contacts = stored ? JSON.parse(stored) : [];
            renderContactsList();
        }
        function saveContacts() { localStorage.setItem('p2p_contacts_v2', JSON.stringify(contacts)); }
        
        function loadMessagesHistory() {
            const stored = localStorage.getItem('p2p_messages_history_v2');
            messagesHistory = stored ? JSON.parse(stored) : {};
        }
        function saveMessagesHistory() { localStorage.setItem('p2p_messages_history_v2', JSON.stringify(messagesHistory)); }

        function addMessageToHistory(contactId, content, sender, isSent, msgType, fileData = null, mime = '') {
            if (!messagesHistory[contactId]) messagesHistory[contactId] = [];
            messagesHistory[contactId].push({
                content, sender, isSent, msgType, fileData, mime,
                timestamp: Date.now()
            });
            saveMessagesHistory();
            if (activeContactId === contactId) renderMessagesForActiveContact();
        }

        function addSystemMessage(text) {
            if (!activeContactId) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message received';
            msgDiv.style.alignSelf = 'center';
            msgDiv.innerHTML = `<div class="message-content" style="background:#eef2ff; font-size:0.7rem; padding:5px 10px;">📡 ${escapeHtml(text)}</div>`;
            messagesArea.appendChild(msgDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function renderMessagesForActiveContact() {
            messagesArea.innerHTML = '';
            if (!activeContactId) {
                messagesArea.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">👈 Kişi seçin</div>';
                return;
            }
            const history = messagesHistory[activeContactId] || [];
            history.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.isSent ? 'sent' : 'received'}`;
                const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                let contentHtml = '';
                if (msg.msgType === 'text') {
                    contentHtml = `<div class="message-content">${!msg.isSent ? `<strong>${escapeHtml(msg.sender)}:</strong> ` : ''}${escapeHtml(msg.content)}</div>`;
                } else if (msg.msgType === 'image') {
                    contentHtml = `<div class="message-content file-message"><img src="${msg.fileData}" class="message-image" onclick="window.open('${msg.fileData}','_blank')" style="max-width:100%; border-radius:12px;"></div>`;
                } else if (msg.msgType === 'file') {
                    contentHtml = `<div class="message-content file-message" onclick="downloadFile('${msg.fileData}', '${msg.content}')">📎 ${escapeHtml(msg.content)}</div>`;
                }
                
                msgDiv.innerHTML = contentHtml + `<div class="message-time">${timeStr}</div>`;
                messagesArea.appendChild(msgDiv);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        window.downloadFile = (dataUrl, filename) => {
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = filename;
            a.click();
        };

        function renderContactsList() {
            if (contacts.length === 0) {
                contactsListDiv.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:10px;">📭 Henüz kişi yok</div>';
                return;
            }
            contactsListDiv.innerHTML = '';
            contacts.forEach(contact => {
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.innerHTML = `
                    <div class="contact-info">
                        <div class="contact-name">${escapeHtml(contact.name)}</div>
                        <div class="contact-peerid">${escapeHtml(contact.peerId.substring(0, 16))}...</div>
                    </div>
                    <div class="contact-actions">
                        <button class="connect-contact-btn" data-id="${contact.id}" data-peer="${contact.peerId}" data-name="${escapeHtml(contact.name)}">🔗 Bağlan</button>
                        <button class="delete-contact-btn" data-id="${contact.id}">🗑</button>
                    </div>
                `;
                contactsListDiv.appendChild(div);
            });
            document.querySelectorAll('.connect-contact-btn').forEach(btn => {
                btn.onclick = () => selectAndConnectToContact(btn.dataset.id, btn.dataset.peer, btn.dataset.name);
            });
            document.querySelectorAll('.delete-contact-btn').forEach(btn => {
                btn.onclick = () => deleteContactById(btn.dataset.id);
            });
        }

        function selectAndConnectToContact(id, peerId, name) {
            activeContactId = id;
            activeContactPeerId = peerId;
            activeContactName = name;
            activeContactNameSpan.innerText = name;
            renderMessagesForActiveContact();
            if (currentConnection) { currentConnection.close(); currentConnection = null; isConnected = false; }
            isManualDisconnect = false;
            initiateConnectionToPeer(peerId, name);
        }

        function deleteContactById(id) {
            if (confirm('Kişiyi silmek mesaj geçmişini de siler. Devam?')) {
                contacts = contacts.filter(c => c.id !== id);
                saveContacts();
                if (messagesHistory[id]) delete messagesHistory[id];
                saveMessagesHistory();
                if (activeContactId === id) {
                    activeContactId = null;
                    activeContactNameSpan.innerText = "Seçili kişi yok";
                    if (currentConnection) { currentConnection.close(); currentConnection = null; }
                    renderMessagesForActiveContact();
                }
                renderContactsList();
            }
        }

        // SADECE MESAJLARI SİL (kişiler kalır)
        function clearMessagesOnly() {
            if (!activeContactId) {
                alert('Önce bir kişi seçin.');
                return;
            }
            if (confirm('Bu kişiyle olan tüm mesajlaşma geçmişi silinecek. Devam et?')) {
                messagesHistory[activeContactId] = [];
                saveMessagesHistory();
                renderMessagesForActiveContact();
                addSystemMessage('Mesaj geçmişi temizlendi.');
            }
        }

        // Emoji seçici
        function toggleEmojiPicker() {
            if (emojiPicker) { emojiPicker.remove(); emojiPicker = null; return; }
            emojiPicker = document.createElement('div');
            emojiPicker.className = 'emoji-picker';
            const emojis = ['😀', '😂', '🥰', '😎', '😢', '😡', '👍', '❤️', '🔥', '🎉', '🙏', '💯', '✨', '🍕', '☕', '🏆'];
            emojis.forEach(emoji => {
                const span = document.createElement('span');
                span.textContent = emoji;
                span.onclick = () => {
                    messageInput.value += emoji;
                    messageInput.focus();
                    emojiPicker.remove();
                    emojiPicker = null;
                };
                emojiPicker.appendChild(span);
            });
            document.body.appendChild(emojiPicker);
            const rect = emojiBtn.getBoundingClientRect();
            emojiPicker.style.position = 'fixed';
            emojiPicker.style.bottom = '70px';
            emojiPicker.style.left = rect.left + 'px';
        }

        // Dosya seç
        function selectFile(type) {
            const input = document.createElement('input');
            input.type = 'file';
            if (type === 'image') input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) sendFile(file, type);
            };
            input.click();
        }

        // Eventler
        addContactBtn.onclick = () => { modal.style.display = 'flex'; };
        clearMessagesBtn.onclick = clearMessagesOnly;
        modalCancelBtn.onclick = () => { modal.style.display = 'none'; };
        modalSaveBtn.onclick = () => {
            const name = contactNameInput.value.trim();
            const peerId = contactPeerIdInput.value.trim();
            if (!name || !peerId) { alert('Lütfen bilgileri doldurun'); return; }
            if (contacts.some(c => c.peerId === peerId)) { alert('Bu ID zaten mevcut'); return; }
            contacts.push({ id: Date.now().toString() + '_' + Math.random(), name, peerId });
            saveContacts();
            renderContactsList();
            modal.style.display = 'none';
        };
        sendButton.onclick = sendTextMessage;
        copyIdBtn.onclick = () => { navigator.clipboard.writeText(myPermanentId); copyIdBtn.textContent = '✅'; setTimeout(() => copyIdBtn.textContent = '📋 Kopyala', 1500); };
        messageInput.onkeypress = (e) => { if (e.key === 'Enter' && isConnected) sendTextMessage(); };
        emojiBtn.onclick = toggleEmojiPicker;
        fileBtn.onclick = () => selectFile('file');
        imageBtn.onclick = () => selectFile('image');
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; if (emojiPicker && !emojiPicker.contains(e.target) && e.target !== emojiBtn) { emojiPicker.remove(); emojiPicker = null; } };

        // Başlat
        loadContacts();
        loadMessagesHistory();
        initPeerWithPermanentId();
        renderMessagesForActiveContact();
    </script>
</body>
</html>
