<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SEYFİ CHAT - Lite P2P</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Orbitron', monospace;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        /* futuristik neon glow arkaplan */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 10%, rgba(0, 255, 255, 0.08), transparent 70%);
            pointer-events: none;
        }

        .app-wrapper {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px);
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background: rgba(12, 18, 34, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border-radius: 0;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.25);
        }

        @media (min-width: 768px) {
            body {
                padding: 24px;
                background: radial-gradient(circle at 20% 40%, #0a0f1e, #020208);
            }
            .app-wrapper {
                height: auto;
                min-height: 0;
                max-width: 500px;
                width: 100%;
                margin: 0 auto;
                border-radius: 48px;
                background: transparent;
                overflow: hidden;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(0, 255, 255, 0.2);
            }
            .chat-container {
                border-radius: 48px;
                height: 85vh;
                max-height: 800px;
                background: rgba(8, 12, 24, 0.9);
                backdrop-filter: blur(16px);
            }
        }

        @media (max-width: 767px) {
            .app-wrapper {
                height: 100vh;
                height: 100dvh;
                border-radius: 0;
            }
            .chat-container {
                border-radius: 0;
            }
        }

        /* HEADER - neon cam, tam görünür */
        .app-header {
            background: rgba(0, 20, 40, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.5);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            /* güvenli alan - iOS için */
            padding-top: max(14px, env(safe-area-inset-top));
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 1.9rem;
            filter: drop-shadow(0 0 6px cyan);
            text-shadow: 0 0 8px #0ff;
        }
        .header-text h2 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #aaffff, #5f9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            font-family: 'Orbitron', monospace;
        }
        .sub-title {
            font-size: 0.6rem;
            opacity: 0.9;
            color: #8ae2ff;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .header-buttons {
            display: flex;
            gap: 12px;
        }
        .icon-btn {
            background: rgba(0, 255, 255, 0.12);
            border: 1px solid rgba(0, 255, 255, 0.5);
            color: #0ff;
            font-size: 1.3rem;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
        }
        .icon-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 12px cyan;
            transform: scale(1.05);
        }

        /* BAĞLANTI ÇUBUĞU - sadece kritik hatalar için, normal durumda minimal */
        .connection-bar {
            background: rgba(0, 20, 40, 0.7);
            color: #0ff;
            padding: 4px 12px;
            text-align: center;
            font-size: 0.65rem;
            flex-shrink: 0;
            font-family: monospace;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(0,255,255,0.2);
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        .connection-bar.error {
            background: rgba(255, 30, 80, 0.25);
            color: #ff7e9e;
            border-bottom-color: #ff3366;
        }
        /* başarı mesajlarını gösterme, sadece hata durumunda görünür */
        .connection-bar:empty {
            display: none;
        }

        /* SOHBET BAŞLIK - holografik */
        .current-chat-header {
            background: linear-gradient(115deg, rgba(0, 30, 50, 0.7), rgba(10, 20, 40, 0.9));
            padding: 12px 20px;
            border-bottom: 2px solid #0ff;
            flex-shrink: 0;
            backdrop-filter: blur(12px);
        }
        .chat-contact-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .chat-status-light {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            transition: all 0.2s;
            box-shadow: 0 0 6px currentColor;
        }
        .chat-status-light.online { background: #0f0; box-shadow: 0 0 12px #0f0; }
        .chat-status-light.offline { background: #6b7280; box-shadow: none; }
        .chat-status-light.connecting { background: #ffaa33; animation: pulse 1s infinite; box-shadow: 0 0 8px gold; }
        .chat-contact-name {
            font-weight: 800;
            font-size: 1.45rem;
            background: linear-gradient(135deg, #e0f0ff, #8ae2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            text-shadow: 0 0 4px rgba(0,255,255,0.3);
        }
        .typing-badge-small {
            font-size: 0.7rem;
            color: #0ff;
            font-style: italic;
            font-weight: 600;
            background: rgba(0, 255, 255, 0.15);
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 0.5px solid cyan;
        }

        /* MESAJ ALANI - futuristik gradient */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            background: rgba(0, 5, 15, 0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #0a0f1e;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: cyan;
            border-radius: 10px;
        }

        .message { display: flex; flex-direction: column; max-width: 85%; }
        .message.sent { align-self: flex-end; align-items: flex-end; }
        .message.received { align-self: flex-start; align-items: flex-start; }

        .message-content {
            padding: 10px 18px;
            border-radius: 24px;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
            backdrop-filter: blur(8px);
            font-weight: 500;
        }
        .sent .message-content {
            background: linear-gradient(115deg, #0a6cff, #00c6ff);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 0 12px rgba(0, 200, 255, 0.4);
            border: 0.5px solid rgba(255,255,255,0.3);
        }
        .received .message-content {
            background: rgba(20, 30, 55, 0.8);
            color: #eef5ff;
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-bottom-left-radius: 6px;
            backdrop-filter: blur(8px);
        }
        .message-time {
            font-size: 0.55rem;
            color: #8aaee0;
            margin-top: 4px;
            margin-right: 6px;
            font-family: monospace;
        }

        /* INPUT - neon cyber */
        .input-container {
            flex-shrink: 0;
            background: rgba(0, 10, 20, 0.8);
            border-top: 1px solid rgba(0, 255, 255, 0.5);
            padding: 12px 16px;
            backdrop-filter: blur(12px);
        }
        .message-input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            width: 100%;
        }
        #messageInput {
            flex: 1;
            min-width: 0;
            padding: 12px 18px;
            border: 1px solid #0ff;
            border-radius: 60px;
            outline: none;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.6);
            color: #eef5ff;
            font-family: inherit;
            transition: 0.2s;
        }
        #messageInput:focus {
            border-color: #f0f;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.5);
        }
        #messageInput:disabled {
            opacity: 0.5;
            border-color: #5f6c7a;
        }
        #sendButton {
            flex-shrink: 0;
            padding: 10px 24px;
            background: linear-gradient(95deg, #0a6cff, #00c6ff);
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            box-shadow: 0 0 8px cyan;
            letter-spacing: 0.5px;
        }
        #sendButton:hover:not(:disabled) {
            transform: scale(1.02);
            background: linear-gradient(95deg, #2a7eff, #2ad4ff);
            box-shadow: 0 0 16px cyan;
        }
        #sendButton:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* SIDEBAR - cam + neon */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 85%;
            max-width: 340px;
            height: 100%;
            background: rgba(6, 12, 24, 0.95);
            backdrop-filter: blur(24px);
            border-left: 1px solid cyan;
            z-index: 2000;
            transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: -5px 0 30px rgba(0, 255, 255, 0.2);
        }
        .sidebar.open {
            right: 0;
        }
        .sidebar-header {
            background: linear-gradient(95deg, #0b1b3a, #04102a);
            padding: 24px 20px;
            padding-top: max(24px, env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid cyan;
        }
        .sidebar-header h3 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0ff, #aaf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .close-sidebar {
            background: rgba(0,255,255,0.2);
            border: 1px solid cyan;
            color: cyan;
            font-size: 1.4rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
        }
        .sidebar-content {
            flex: 1;
            padding: 20px 16px;
        }
        .settings-section {
            margin-bottom: 28px;
        }
        .settings-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #0ff;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .settings-value {
            background: rgba(0, 30, 50, 0.6);
            padding: 12px 14px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            word-break: break-all;
            border: 0.5px solid rgba(0,255,255,0.3);
        }
        .settings-value span {
            font-family: monospace;
            font-size: 0.8rem;
            color: #caf0ff;
        }
        .mini-btn {
            background: #0f2a44;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 600;
            color: #0ff;
            transition: 0.2s;
        }
        .mini-btn.primary {
            background: linear-gradient(95deg, #0a6cff, #0099ff);
            color: white;
            box-shadow: 0 0 6px cyan;
        }
        .mini-btn.danger {
            background: rgba(255, 50, 80, 0.2);
            color: #ff7799;
            border: 1px solid #ff3366;
        }
        .warning-text {
            font-size: 0.6rem;
            color: #ffaa55;
            margin-top: 8px;
            text-align: center;
        }

        /* KİŞİ LİSTESİ - neon futuristik kartlar */
        .contacts-list-sidebar {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .contact-item-sidebar {
            background: rgba(10, 25, 45, 0.7);
            border-radius: 28px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.5);
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .contact-item-sidebar.active-contact {
            border-left: 6px solid #0ff;
            background: rgba(0, 100, 150, 0.3);
            box-shadow: 0 0 18px rgba(0,255,255,0.3);
        }
        .contact-info-sidebar {
            flex: 1;
            cursor: pointer;
        }
        .contact-name-sidebar {
            font-weight: 800;
            font-size: 1rem;
            color: #caf0ff;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .contact-phone-sidebar {
            font-size: 0.6rem;
            color: #7f9fcf;
            font-family: monospace;
        }
        .contact-badge {
            font-size: 0.55rem;
            padding: 2px 8px;
            border-radius: 40px;
            font-weight: 600;
        }
        .contact-badge.online { background: #00ff8020; color: #2effb0; border: 0.5px solid #0f0; }
        .contact-badge.pending { background: #ffaa3320; color: #ffbb55; }
        .contact-badge.unread { background: #ff226620; color: #ff88aa; }
        .contact-actions-sidebar {
            display: flex;
            gap: 10px;
        }
        .contact-action-btn.edit-key {
            background: rgba(0, 200, 255, 0.15);
            border: 1px solid cyan;
            font-size: 1.1rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0ff;
        }
        .add-contact-btn-sidebar {
            width: 100%;
            background: linear-gradient(95deg, #0a6cff, #00a6ff);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 800;
            margin-top: 28px;
            cursor: pointer;
            font-size: 0.9rem;
            box-shadow: 0 0 10px cyan;
        }

        /* MODALAR */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .modal-content {
            background: #0f172ad9;
            backdrop-filter: blur(20px);
            width: 85%;
            max-width: 320px;
            border-radius: 40px;
            padding: 24px 20px;
            border: 1px solid cyan;
            box-shadow: 0 0 40px rgba(0,255,255,0.3);
        }
        .modal-content h3 {
            color: #0ff;
            margin-bottom: 16px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px 16px;
            margin: 12px 0;
            border: 1px solid #0ff;
            border-radius: 60px;
            background: rgba(0,0,0,0.5);
            color: white;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }
        .modal-save { background: #0a6cff; color: white; flex: 1; padding: 10px; border-radius: 60px; border: none; font-weight: bold; }
        .modal-cancel { background: #2d3748; color: #cbd5e1; flex: 1; border: none; border-radius: 60px; }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        .no-contact-selected {
            text-align: center;
            color: #7f9fcf;
            padding: 48px 20px;
            font-size: 1rem;
            background: rgba(0,20,40,0.4);
            border-radius: 48px;
            margin: 20px;
            border: 1px dashed cyan;
        }
        hr {
            margin: 20px 0;
            border-color: rgba(0,255,255,0.3);
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="chat-container" id="chatContainer">
        <div class="app-header">
            <div class="logo-section">
                <div class="logo-icon">⚡🌀</div>
                <div class="header-text">
                    <h2>SEYFİ CHAT</h2>
                    <div class="sub-title">◢ Lite ◣</div>
                </div>
            </div>
            <div class="header-buttons">
                <button class="icon-btn" id="settingsBtn">🔮</button>
                <button class="icon-btn" id="contactsBtn">👥</button>
            </div>
        </div>
        <div class="connection-bar" id="status"></div>

        <div class="current-chat-header" id="currentChatHeader" style="display: none;">
            <div class="chat-contact-info">
                <div class="chat-status-light" id="chatStatusLight"></div>
                <span class="chat-contact-name" id="currentChatName">--</span>
                <span id="chatTypingIndicator" style="display:none;" class="typing-badge-small">✍️ YAZIYOR...</span>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="no-contact-selected">⚡ SAĞ ÜSTTEN KİŞİ SEÇ ⚡</div>
        </div>

        <div class="input-container" id="inputContainer" style="display: none;">
            <div class="message-input-row">
                <input type="text" id="messageInput" placeholder="➤ MESAJ YAZ..." disabled>
                <button id="sendButton" disabled>GÖNDER</button>
            </div>
        </div>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3 id="sidebarTitle">PANEL</h3>
        <button class="close-sidebar" id="closeSidebar">✕</button>
    </div>
    <div class="sidebar-content" id="sidebarContent"></div>
</div>

<div id="contactModal" style="display: none;" class="modal-overlay">
    <div class="modal-content">
        <h3>➕ BAĞLANTI EKLE</h3>
        <input type="text" id="contactNameInput" placeholder="KOD ADI">
        <input type="tel" id="contactPhoneInput" placeholder="NUMARA: +90555...">
        <div class="modal-buttons">
            <button class="modal-cancel" id="modalCancelBtn">İPTAL</button>
            <button class="modal-save" id="modalSaveBtn">EKLE</button>
        </div>
    </div>
</div>

<div id="editPhoneModal" style="display: none;" class="modal-overlay">
    <div class="modal-content">
        <h3>📡 BENİM ID</h3>
        <input type="tel" id="editPhoneInput" placeholder="+905551234567">
        <div class="warning-text">⚠️ BU NUMARA SİZİN KRİPTO KİMLİĞİNİZ</div>
        <div class="modal-buttons">
            <button class="modal-cancel" id="editPhoneCancel">VAZGEÇ</button>
            <button class="modal-save" id="editPhoneSave">KAYDET</button>
        </div>
    </div>
</div>

<div id="editContactModal" style="display: none;" class="modal-overlay">
    <div class="modal-content">
        <h3>✏️ BAĞLANTI DÜZENLE</h3>
        <input type="text" id="editContactNameInput" placeholder="YENİ AD">
        <input type="tel" id="editContactPhoneInput" placeholder="YENİ NUMARA">
        <div class="modal-buttons">
            <button class="modal-cancel" id="editContactCancelBtn">İPTAL</button>
            <button class="modal-save" id="editContactSaveBtn">GÜNCELLE</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    // ========= SEYFİ CHAT LITE - SESSİZ BAĞLANTI, SADECE IŞIK =========
    const PEER_CONFIG = {
        debug: 0,
        config: {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        }
    };

    let myPhoneNumber = "";
    let peer = null;
    let currentConnection = null;
    let isConnected = false;
    let activeContactId = null;
    let activeContactName = "";
    let contacts = [];
    let messagesHistory = {};
    let pendingMessages = {};
    let contactStatus = {};
    let unreadCounts = {};
    let currentSidebarMode = 'settings';

    const elements = {
        statusDiv: document.getElementById('status'),
        messagesArea: document.getElementById('messagesArea'),
        messageInput: document.getElementById('messageInput'),
        sendButton: document.getElementById('sendButton'),
        inputContainer: document.getElementById('inputContainer'),
        currentChatHeader: document.getElementById('currentChatHeader'),
        currentChatName: document.getElementById('currentChatName'),
        chatStatusLight: document.getElementById('chatStatusLight'),
        chatTypingIndicator: document.getElementById('chatTypingIndicator'),
        settingsBtn: document.getElementById('settingsBtn'),
        contactsBtn: document.getElementById('contactsBtn'),
        sidebar: document.getElementById('sidebar'),
        sidebarTitle: document.getElementById('sidebarTitle'),
        sidebarContent: document.getElementById('sidebarContent'),
        closeSidebar: document.getElementById('closeSidebar')
    };

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); }
    function showNotification(title, body) { if (Notification.permission === 'granted') new Notification(title, { body }); else if (Notification.permission !== 'denied') Notification.requestPermission(); }
    
    // SESSİZ STATUS: sadece hata durumunda göster, normal bağlantı mesajları yok
    function updateStatus(message, isError = false) {
        if (isError) {
            elements.statusDiv.innerHTML = message;
            elements.statusDiv.classList.add('error');
            setTimeout(() => { if(elements.statusDiv.innerHTML === message) elements.statusDiv.innerHTML = ''; }, 3000);
        } else {
            // başarı / bilgi mesajlarını gösterme - sadece hata göster
            if(elements.statusDiv.innerHTML) elements.statusDiv.innerHTML = '';
            elements.statusDiv.classList.remove('error');
        }
    }

    function loadPhoneNumber() { let saved = localStorage.getItem('seyficet_phone'); if (saved && saved.trim() !== "") { myPhoneNumber = saved.trim(); return true; } myPhoneNumber = ""; return false; }
    function savePhoneNumber(phone) {
        if (!phone || phone.trim() === "") { myPhoneNumber = ""; localStorage.removeItem('seyficet_phone'); if (peer) peer.destroy(); peer = null; updateStatus('⚠️ ID GEREKLİ', true); return false; }
        let cleanPhone = phone.trim().replace(/\s/g, ''); myPhoneNumber = cleanPhone; localStorage.setItem('seyficet_phone', myPhoneNumber); initPeer(); return true;
    }

    function initPeer() {
        if (!myPhoneNumber) { updateStatus('⚠️ AYARLARDAN ID GİRİN', true); return; }
        if (peer) { peer.destroy(); peer = null; }
        try {
            peer = new Peer(myPhoneNumber, PEER_CONFIG);
            peer.on('open', (id) => { /* sessiz */ });
            peer.on('error', (err) => {
                console.error(err);
                if (err.type === 'unavailable-id') updateStatus(`❌ ID KULLANIMDA!`, true);
                else updateStatus(`⚠️ BAĞLANTI HATASI`, true);
            });
            peer.on('connection', handleIncomingConnection);
            peer.on('disconnected', () => { updateStatus(`⚠️ BAĞLANTI KESİLDİ`, true); setTimeout(() => { if (peer) peer.reconnect(); }, 3000); });
        } catch(e) { updateStatus(`❌ HATA`, true); }
    }

    function handleIncomingConnection(incoming) {
        let contact = contacts.find(c => c.phoneNumber === incoming.peer);
        if (!contact) { incoming.close(); return; }
        if (currentConnection && isConnected) { incoming.close(); return; }
        if (currentConnection) currentConnection.close();
        currentConnection = incoming; activeContactId = contact.id; activeContactName = contact.name;
        elements.currentChatName.innerText = contact.name;
        setupConnectionEvents(currentConnection, contact.id, contact.name);
        updateContactStatus(contact.id, 'connected');
        setConnectedState(true);
        flushPendingMessages(contact.id);
        showChatInterface(true);
        renderMessagesForActiveContact();
        renderSidebarContent();
    }

    function setupConnectionEvents(connection, contactId, contactName) {
        connection.on('open', () => { if (activeContactId === contactId) { isConnected = true; setConnectedState(true); updateContactStatus(contactId, 'connected'); flushPendingMessages(contactId); } });
        let typingTimeout = null;
        connection.on('data', (data) => {
            if (activeContactId === contactId && currentConnection === connection) {
                if (data.type === 'text') addMessageToHistory(contactId, data.text, contactName, false, 'text');
                else if (data.type === 'typing') { elements.chatTypingIndicator.style.display = 'inline-block'; if (typingTimeout) clearTimeout(typingTimeout); typingTimeout = setTimeout(() => elements.chatTypingIndicator.style.display = 'none', 2000); }
            }
        });
        connection.on('close', () => { if (activeContactId === contactId && currentConnection === connection) { updateContactStatus(contactId, 'offline'); setConnectedState(false); currentConnection = null; isConnected = false; } });
    }

    function connectToContact(id, phoneNumber, name) {
        if (!myPhoneNumber) { alert('ÖNCE AYARLARDAN KENDİ NUMARANIZI GİRİN'); return; }
        if (activeContactId === id && isConnected) return;
        if (currentConnection) disconnectCurrent();
        activeContactId = id; activeContactName = name; elements.currentChatName.innerText = name;
        updateChatHeaderStatus(); renderMessagesForActiveContact(); updateContactStatus(id, 'connecting'); showChatInterface(true);
        try {
            let newConn = peer.connect(phoneNumber);
            if (!newConn) { updateContactStatus(id, 'offline'); updateStatus(`❌ BAĞLANTI BAŞARISIZ`, true); return; }
            currentConnection = newConn; setupConnectionEvents(currentConnection, id, name);
            setTimeout(() => { if (currentConnection === newConn && !isConnected) { updateContactStatus(id, 'offline'); setConnectedState(false); if (currentConnection === newConn) currentConnection = null; } }, 15000);
        } catch(e) { updateContactStatus(id, 'offline'); updateStatus(`❌ HATA`, true); }
    }

    function disconnectCurrent() { if (currentConnection) { let contact = contacts.find(c => c.id === activeContactId); if (contact) updateContactStatus(activeContactId, 'offline'); currentConnection.close(); currentConnection = null; isConnected = false; setConnectedState(false); } }

    function sendTextMessage() { if (!activeContactId || !isConnected) return; let text = elements.messageInput.value.trim(); if (!text) return; sendMessageNow(activeContactId, 'text', text); elements.messageInput.value = ''; }

    function sendMessageNow(contactId, type, content) {
        const isConnectedNow = (activeContactId === contactId && isConnected && currentConnection);
        if (isConnectedNow) { try { if (type === 'text') { currentConnection.send({ type: 'text', text: content }); addMessageToHistory(contactId, content, 'Ben', true, 'text'); } return true; } catch(err) { queueMessage(contactId, { type, content }); return false; } }
        else { queueMessage(contactId, { type, content }); return false; }
    }
    function queueMessage(contactId, msg) { if (!pendingMessages[contactId]) pendingMessages[contactId] = []; pendingMessages[contactId].push(msg); if (contactStatus[contactId] !== 'connected') updateContactStatus(contactId, 'pending'); addMessageToHistory(contactId, `⏳ ${msg.content} (beklemede)`, 'Ben', true, 'text', null, null, true); }
    function flushPendingMessages(contactId) { if (!pendingMessages[contactId]?.length || !currentConnection || !isConnected || activeContactId !== contactId) return; let pending = [...pendingMessages[contactId]]; pendingMessages[contactId] = []; for (let msg of pending) { try { if (msg.type === 'text') { currentConnection.send({ type: 'text', text: msg.content }); addMessageToHistory(contactId, msg.content, 'Ben', true, 'text'); } } catch(err) { if (!pendingMessages[contactId]) pendingMessages[contactId] = []; pendingMessages[contactId].unshift(msg); } } }

    function addMessageToHistory(contactId, content, sender, isSent, msgType, fileData = null, mime = '', isPending = false) { if (!messagesHistory[contactId]) messagesHistory[contactId] = []; let msg = { content, sender, isSent, msgType, fileData, mime, isPending, timestamp: Date.now() }; messagesHistory[contactId].push(msg); saveMessagesHistory(); if (activeContactId === contactId) renderMessagesForActiveContact(); if (!isSent && activeContactId !== contactId) { unreadCounts[contactId] = (unreadCounts[contactId] || 0) + 1; renderSidebarContent(); showNotification(`${sender}`, content.length > 30 ? content.substring(0,30)+'...' : content); } }

    function sendTyping() { if (currentConnection && isConnected) currentConnection.send({ type: 'typing' }); }
    if (elements.messageInput) elements.messageInput.addEventListener('input', () => { if (isConnected && activeContactId) { sendTyping(); clearTimeout(window.typingTimer); window.typingTimer = setTimeout(() => {}, 1000); } });

    function renderMessagesForActiveContact() {
        if (!elements.messagesArea) return; elements.messagesArea.innerHTML = '';
        if (!activeContactId) { elements.messagesArea.innerHTML = '<div class="no-contact-selected">⚡ SAĞ ÜSTTEN KİŞİ SEÇ ⚡</div>'; return; }
        let history = messagesHistory[activeContactId] || [];
        if (history.length === 0) { elements.messagesArea.innerHTML = '<div class="no-contact-selected">💬 MESAJ YOK</div>'; return; }
        history.forEach((msg) => { let div = document.createElement('div'); div.className = `message ${msg.isSent ? 'sent' : 'received'}`; let timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); let senderName = !msg.isSent ? `<strong>${escapeHtml(msg.sender)}:</strong> ` : ''; let contentDisplay = msg.msgType === 'text' ? escapeHtml(msg.content) : msg.content; div.innerHTML = `<div class="message-content">${senderName}${contentDisplay}</div><div class="message-time">${timeStr}</div>`; elements.messagesArea.appendChild(div); });
        elements.messagesArea.scrollTop = elements.messagesArea.scrollHeight;
        if (unreadCounts[activeContactId]) { delete unreadCounts[activeContactId]; renderSidebarContent(); }
    }
    function updateChatHeaderStatus() { if (!activeContactId) { elements.currentChatHeader.style.display = 'none'; return; } elements.currentChatHeader.style.display = 'flex'; let status = contactStatus[activeContactId] || 'offline'; let statusClass = status === 'connected' ? 'online' : (status === 'connecting' ? 'connecting' : 'offline'); elements.chatStatusLight.className = `chat-status-light ${statusClass}`; }
    function updateContactStatus(id, status) { contactStatus[id] = status; renderSidebarContent(); updateChatHeaderStatus(); }
    function setConnectedState(connected) { isConnected = connected; if (elements.messageInput) elements.messageInput.disabled = !connected; if (elements.sendButton) elements.sendButton.disabled = !connected; updateChatHeaderStatus(); }
    function showChatInterface(show) { if (show && activeContactId) { elements.inputContainer.style.display = 'block'; elements.currentChatHeader.style.display = 'flex'; } else if (!activeContactId) { elements.inputContainer.style.display = 'none'; elements.currentChatHeader.style.display = 'none'; } }

    function showEditContactModal(contactId, currentName, currentPhone) {
        const modal = document.getElementById('editContactModal'); document.getElementById('editContactNameInput').value = currentName; document.getElementById('editContactPhoneInput').value = currentPhone; modal.style.display = 'flex';
        const saveHandler = () => { let newName = document.getElementById('editContactNameInput').value.trim(); let newPhone = document.getElementById('editContactPhoneInput').value.trim().replace(/\s/g, ''); if (!newName || !newPhone) { alert('Ad ve numara gerekli'); return; } if (newPhone === myPhoneNumber) { alert('Kendi ID eklenemez'); return; } if (contacts.some(c => c.id !== contactId && c.phoneNumber === newPhone)) { alert('Bu ID zaten kayıtlı'); return; } let contactIndex = contacts.findIndex(c => c.id === contactId); if (contactIndex !== -1) { contacts[contactIndex].name = newName; contacts[contactIndex].phoneNumber = newPhone; if (activeContactId === contactId) { activeContactName = newName; elements.currentChatName.innerText = newName; } saveContacts(); renderSidebarContent(); renderMessagesForActiveContact(); } modal.style.display = 'none'; cleanup(); };
        const cancelHandler = () => { modal.style.display = 'none'; cleanup(); };
        const cleanup = () => { document.getElementById('editContactSaveBtn').removeEventListener('click', saveHandler); document.getElementById('editContactCancelBtn').removeEventListener('click', cancelHandler); };
        document.getElementById('editContactSaveBtn').addEventListener('click', saveHandler); document.getElementById('editContactCancelBtn').addEventListener('click', cancelHandler);
    }

    function renderSidebarContent() {
        if (!elements.sidebarContent) return;
        if (currentSidebarMode === 'settings') {
            elements.sidebarTitle.innerText = '⚙️ KRİPTO AYARLAR'; elements.sidebarContent.innerHTML = `<div class="settings-section"><div class="settings-label">📡 BENİM ID</div><div class="settings-value"><span>${myPhoneNumber && myPhoneNumber !== "" ? escapeHtml(myPhoneNumber) : "TANIMLI DEĞİL"}</span><button class="mini-btn primary" id="editPhoneSettingsBtn">${myPhoneNumber ? "✏️ DÜZENLE" : "➕ OLUŞTUR"}</button></div><div class="warning-text">⚠️ BU ID SİZİN KRİPTO KİMLİĞİNİZ</div></div><hr><div class="settings-section"><div class="settings-label">🗑️ SOHBET SİL</div><div class="settings-value"><span>AKTİF KİŞİNİN GEÇMİŞİ</span><button class="mini-btn danger" id="clearHistorySettingsBtn">🧹 TEMİZLE</button></div></div>`;
            document.getElementById('editPhoneSettingsBtn')?.addEventListener('click', () => { document.getElementById('editPhoneModal').style.display = 'flex'; }); document.getElementById('clearHistorySettingsBtn')?.addEventListener('click', () => { if (!activeContactId) { alert('Aktif sohbet yok'); return; } if(confirm('Tüm mesajlar silinsin mi?')) { messagesHistory[activeContactId] = []; saveMessagesHistory(); renderMessagesForActiveContact(); } });
        } else {
            elements.sidebarTitle.innerText = '👥 KRİPTO BAĞLANTILAR'; let contactsHtml = '<div class="contacts-list-sidebar">'; if (contacts.length === 0) contactsHtml += '<div style="text-align:center; color:#8aaee0;">📡 BAĞLANTI YOK</div>'; else contacts.forEach(contact => { let status = contactStatus[contact.id] || 'offline'; let isActive = activeContactId === contact.id; let pendingCount = pendingMessages[contact.id]?.length || 0; let unreadCount = unreadCounts[contact.id] || 0; let isOnline = status === 'connected'; contactsHtml += `<div class="contact-item-sidebar ${isActive ? 'active-contact' : ''}" data-contact-id="${contact.id}"><div class="contact-info-sidebar contact-clickable" data-id="${contact.id}" data-phone="${contact.phoneNumber}" data-name="${escapeHtml(contact.name)}"><div class="contact-name-sidebar">${escapeHtml(contact.name)}${isOnline ? '<span class="contact-badge online">● AKTİF</span>' : ''}${pendingCount ? `<span class="contact-badge pending">📬 ${pendingCount}</span>` : ''}${unreadCount ? `<span class="contact-badge unread">🔔 ${unreadCount}</span>` : ''}</div><div class="contact-phone-sidebar">📞 ${escapeHtml(contact.phoneNumber)}</div></div><div class="contact-actions-sidebar"><button class="contact-action-btn edit-key" data-id="${contact.id}" data-name="${escapeHtml(contact.name)}" data-phone="${contact.phoneNumber}">🔧</button></div></div>`; }); contactsHtml += `<button class="add-contact-btn-sidebar" id="addContactSidebarBtn">+ YENİ BAĞLANTI</button></div>`; elements.sidebarContent.innerHTML = contactsHtml;
            document.querySelectorAll('.contact-clickable').forEach(el => { el.addEventListener('click', (e) => { e.stopPropagation(); let id = el.dataset.id; let phone = el.dataset.phone; let name = el.dataset.name; connectToContact(id, phone, name); closeSidebar(); }); }); document.querySelectorAll('.edit-key').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); let id = btn.dataset.id; let contact = contacts.find(c => c.id === id); if (contact) showEditContactModal(id, contact.name, contact.phoneNumber); }); }); document.getElementById('addContactSidebarBtn')?.addEventListener('click', () => { closeSidebar(); showAddContactModal(); });
        }
    }

    function showAddContactModal() { const modal = document.getElementById('contactModal'); document.getElementById('contactNameInput').value = ''; document.getElementById('contactPhoneInput').value = ''; modal.style.display = 'flex'; const saveHandler = () => { let name = document.getElementById('contactNameInput').value.trim(); let phone = document.getElementById('contactPhoneInput').value.trim().replace(/\s/g, ''); if (!name || !phone) { alert('Eksik bilgi'); return; } if (contacts.some(c => c.phoneNumber === phone)) { alert('Bu ID zaten var'); return; } if (phone === myPhoneNumber) { alert('Kendi ID eklenemez'); return; } let newId = Date.now() + '_' + Math.random().toString(36); contacts.push({ id: newId, name, phoneNumber: phone }); contactStatus[newId] = 'offline'; pendingMessages[newId] = []; saveContacts(); renderSidebarContent(); modal.style.display = 'none'; cleanup(); }; const cancelHandler = () => { modal.style.display = 'none'; cleanup(); }; const cleanup = () => { document.getElementById('modalSaveBtn').removeEventListener('click', saveHandler); document.getElementById('modalCancelBtn').removeEventListener('click', cancelHandler); }; document.getElementById('modalSaveBtn').addEventListener('click', saveHandler); document.getElementById('modalCancelBtn').addEventListener('click', cancelHandler); }
    function saveContacts() { localStorage.setItem('seyficet_contacts_v2', JSON.stringify(contacts)); }
    function saveMessagesHistory() { localStorage.setItem('seyficet_messages_v2', JSON.stringify(messagesHistory)); }
    function loadContacts() { let stored = localStorage.getItem('seyficet_contacts_v2'); contacts = stored ? JSON.parse(stored) : []; contacts.forEach(c => { if (!contactStatus[c.id]) contactStatus[c.id] = 'offline'; if (!pendingMessages[c.id]) pendingMessages[c.id] = []; }); renderSidebarContent(); }
    function loadMessagesHistory() { let stored = localStorage.getItem('seyficet_messages_v2'); messagesHistory = stored ? JSON.parse(stored) : {}; }

    elements.sendButton.onclick = sendTextMessage; elements.messageInput.onkeypress = (e) => { if (e.key === 'Enter' && activeContactId && isConnected) sendTextMessage(); };
    elements.settingsBtn.onclick = () => openSidebar('settings'); elements.contactsBtn.onclick = () => openSidebar('contacts'); elements.closeSidebar.onclick = closeSidebar;
    function closeSidebar() { elements.sidebar.classList.remove('open'); } function openSidebar(mode) { currentSidebarMode = mode; renderSidebarContent(); elements.sidebar.classList.add('open'); }
    document.getElementById('editPhoneSave')?.addEventListener('click', () => { let newPhone = document.getElementById('editPhoneInput').value.trim().replace(/\s/g, ''); if (!newPhone) { alert('Geçerli ID girin'); return; } savePhoneNumber(newPhone); document.getElementById('editPhoneModal').style.display = 'none'; renderSidebarContent(); });
    document.getElementById('editPhoneCancel')?.addEventListener('click', () => { document.getElementById('editPhoneModal').style.display = 'none'; });
    if (Notification.permission === 'default') Notification.requestPermission();
    loadContacts(); loadMessagesHistory(); const hasPhone = loadPhoneNumber(); if (hasPhone) initPeer(); else updateStatus('⚠️ AYARLARDAN ID GİRİN', true); renderMessagesForActiveContact(); showChatInterface(false);
</script>
</body>
