<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SEYFİÇET - P2P Mesajlaşma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
        }

        /* Üst başlık alanı - SEYFİÇET logosu */
        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .app-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .chat-header {
            background: #4a90e2;
            color: white;
            padding: 10px 16px;
            text-align: center;
            flex-shrink: 0;
        }

        .chat-header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .connection-status {
            font-size: 0.65rem;
            margin-top: 4px;
            color: #f0f0f0;
        }

        /* Kişi paneli */
        .contacts-panel {
            background: #f8f9fc;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
        }

        .my-info {
            padding: 8px 12px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .my-id-box {
            flex: 1;
            min-width: 0;
        }

        .my-id-label {
            font-size: 0.6rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .my-id-value {
            font-family: monospace;
            font-size: 0.65rem;
            background: #f1f5f9;
            padding: 5px 8px;
            border-radius: 8px;
            word-break: break-all;
            margin-top: 3px;
            color: #1e293b;
        }

        .copy-id-btn {
            background: #e2e8f0;
            border: none;
            padding: 6px 12px;
            border-radius: 25px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #334155;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.1s;
        }

        .copy-id-btn:active {
            background: #cbd5e1;
            transform: scale(0.96);
        }

        .contacts-header {
            padding: 10px 12px 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .contacts-title {
            font-weight: 600;
            color: #1e293b;
            font-size: 0.8rem;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .add-contact-btn, .clear-all-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 18px;
            font-size: 0.65rem;
            font-weight: 500;
            cursor: pointer;
        }

        .clear-all-btn {
            background: #ef4444;
        }

        .clear-all-btn:active {
            background: #dc2626;
            transform: scale(0.96);
        }

        .add-contact-btn:active {
            transform: scale(0.96);
        }

        .contacts-list {
            max-height: 130px;
            overflow-y: auto;
            padding: 0 10px 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .contact-item {
            background: white;
            border-radius: 12px;
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #0f172a;
            word-break: break-word;
        }

        .contact-peerid {
            font-family: monospace;
            font-size: 0.6rem;
            color: #64748b;
            margin-top: 2px;
            word-break: break-all;
        }

        .contact-actions {
            display: flex;
            gap: 6px;
            margin-left: 8px;
        }

        .contact-actions button {
            background: none;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 18px;
            transition: background 0.1s;
            font-weight: 500;
        }

        .connect-contact-btn {
            background: #e6f7e6;
            color: #2e7d32;
            font-size: 0.65rem;
            padding: 4px 10px;
        }

        .connect-contact-btn:active {
            background: #c8e6c9;
        }

        .delete-contact-btn {
            color: #ef4444;
            font-size: 0.9rem;
            padding: 4px 6px;
        }

        .delete-contact-btn:active {
            background: #fee2e2;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: white;
            width: 85%;
            max-width: 320px;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }

        .modal-content h3 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: #0f172a;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;
            border: 1px solid #cbd5e1;
            border-radius: 24px;
            font-size: 0.9rem;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 30px;
            border: none;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-save {
            background: #4a90e2;
            color: white;
        }

        .modal-cancel {
            background: #e2e8f0;
            color: #334155;
        }

        /* Mesaj alanı */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px;
            background: #f1f5f9;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.sent {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.received {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-content {
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .sent .message-content {
            background: #4a90e2;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .message-content {
            background: white;
            color: #1e293b;
            border: 0.5px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.6rem;
            color: #64748b;
            margin-top: 3px;
            margin-left: 6px;
            margin-right: 6px;
        }

        .current-chat-info {
            padding: 6px 12px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
            border-bottom: 1px solid #eef2f6;
            font-size: 0.75rem;
            font-weight: 500;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .current-chat-name {
            color: #4a90e2;
            font-weight: 600;
        }

        /* Input alanı - gönder tuşu mesaj kutusuna daha yakın, tam sığacak */
        .input-area {
            padding: 10px 12px;
            background: white;
            border-top: 1px solid #edf2f7;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }

        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 28px;
            outline: none;
            font-size: 0.95rem;
            background: #ffffff;
            transition: border 0.2s;
        }

        #messageInput:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 2px rgba(74,144,226,0.15);
        }

        #sendButton {
            padding: 10px 18px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 28px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.1s;
            min-width: 70px;
        }

        #sendButton:active {
            transform: scale(0.96);
            background: #357abd;
        }

        #sendButton:disabled {
            background: #b9c8f0;
            cursor: not-allowed;
            transform: none;
        }

        button:active {
            transform: scale(0.96);
        }

        .retry-badge {
            font-size: 0.6rem;
            margin-left: 6px;
            background: #ff9800;
            padding: 2px 6px;
            border-radius: 16px;
            color: white;
        }

        /* Konfirmasyon modalı */
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1100;
        }
        .confirm-content {
            background: white;
            border-radius: 24px;
            padding: 20px;
            width: 280px;
            text-align: center;
        }
        .confirm-content p {
            margin-bottom: 20px;
            font-size: 1rem;
            color: #1e293b;
        }
        .confirm-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .confirm-buttons button {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 500;
            cursor: pointer;
        }
        .confirm-yes {
            background: #ef4444;
            color: white;
        }
        .confirm-no {
            background: #e2e8f0;
            color: #334155;
        }

        @media (max-width: 480px) {
            .contacts-list {
                max-height: 115px;
            }
            #sendButton {
                padding: 10px 16px;
                min-width: 65px;
                font-size: 0.85rem;
            }
            #messageInput {
                padding: 10px 12px;
                font-size: 0.9rem;
            }
            .input-area {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- SEYFİÇET başlığı en üstte -->
        <div class="app-header">
            <h2>SEYFİÇET</h2>
        </div>
        
        <div class="chat-header">
            <h1>💬 P2P Mesajlaşma</h1>
            <div class="connection-status" id="status">Bağlantı bekleniyor...</div>
        </div>

        <div class="contacts-panel">
            <div class="my-info">
                <div class="my-id-box">
                    <div class="my-id-label">🔑 KALICI ID'NİZ</div>
                    <div class="my-id-value" id="myPeerId">Bağlanıyor...</div>
                </div>
                <button class="copy-id-btn" id="copyIdBtn">📋 Kopyala</button>
            </div>
            <div class="contacts-header">
                <span class="contacts-title">📒 KİŞİLERİM</span>
                <div class="action-buttons">
                    <button class="clear-all-btn" id="clearAllBtn">🗑 Tümünü Sil</button>
                    <button class="add-contact-btn" id="addContactBtn">+ Yeni Kişi</button>
                </div>
            </div>
            <div class="contacts-list" id="contactsList">
                <div style="text-align:center; color:#94a3b8; padding:10px;">Henüz kişi eklenmemiş</div>
            </div>
        </div>

        <div class="current-chat-info" id="currentChatInfo">
            💬 Sohbet: <span id="activeContactName" class="current-chat-name">Seçili kişi yok</span>
            <span id="connectionRetryBadge" style="display:none;" class="retry-badge">🔄 Yeniden bağlanıyor...</span>
        </div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Mesaj yaz..." disabled>
            <button id="sendButton" disabled>Gönder</button>
        </div>
    </div>

    <!-- Modal: kişi ekleme -->
    <div id="contactModal" style="display: none;" class="modal-overlay">
        <div class="modal-content">
            <h3>➕ Yeni Kişi Ekle</h3>
            <input type="text" id="contactNameInput" placeholder="Kişi adı (ör: Ahmet Yılmaz)" autocomplete="off">
            <input type="text" id="contactPeerIdInput" placeholder="Karşı tarafın Peer ID'si" autocomplete="off">
            <div class="modal-buttons">
                <button class="modal-cancel" id="modalCancelBtn">Vazgeç</button>
                <button class="modal-save" id="modalSaveBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        // ============ KALICI ID VE VERİLER ============
        let myPermanentId = null;
        let peer = null;
        let currentConnection = null;
        let isConnected = false;
        let activeContactId = null;
        let activeContactPeerId = null;
        let activeContactName = "";
        let reconnectTimer = null;
        let isManualDisconnect = false;

        let contacts = [];
        let messagesHistory = {};

        // DOM elementleri
        const myPeerIdDiv = document.getElementById('myPeerId');
        const copyIdBtn = document.getElementById('copyIdBtn');
        const contactsListDiv = document.getElementById('contactsList');
        const addContactBtn = document.getElementById('addContactBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const modal = document.getElementById('contactModal');
        const contactNameInput = document.getElementById('contactNameInput');
        const contactPeerIdInput = document.getElementById('contactPeerIdInput');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalSaveBtn = document.getElementById('modalSaveBtn');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusDiv = document.getElementById('status');
        const activeContactNameSpan = document.getElementById('activeContactName');
        const connectionRetryBadge = document.getElementById('connectionRetryBadge');

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Kalıcı ID oluştur veya yükle
        function getOrCreatePermanentId() {
            let savedId = localStorage.getItem('p2p_my_permanent_id');
            if (savedId && savedId.trim() !== "") {
                return savedId;
            }
            const newId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
            localStorage.setItem('p2p_my_permanent_id', newId);
            return newId;
        }

        // PeerJS başlat
        function initPeerWithPermanentId() {
            myPermanentId = getOrCreatePermanentId();
            myPeerIdDiv.textContent = myPermanentId;
            
            peer = new Peer(myPermanentId, {
                debug: 0,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });
            
            peer.on('open', (id) => {
                if (id === myPermanentId) {
                    statusDiv.innerHTML = '✅ Kalıcı ID aktif! Kişi ekleyip bağlanabilirsiniz.';
                    statusDiv.style.color = '#d1fae5';
                }
            });
            
            peer.on('error', (err) => {
                console.error('Peer hatası:', err);
                if (err.type === 'unavailable-id') {
                    localStorage.removeItem('p2p_my_permanent_id');
                    myPermanentId = getOrCreatePermanentId();
                    peer.destroy();
                    initPeerWithPermanentId();
                } else {
                    statusDiv.innerHTML = '⚠️ Bağlantı sorunu';
                }
            });
            
            peer.on('disconnected', () => {
                if (!isManualDisconnect) {
                    statusDiv.innerHTML = '🔄 Sunucu bağlantısı yenileniyor...';
                    peer.reconnect();
                }
            });
            
            peer.on('connection', handleIncomingConnection);
        }

        function handleIncomingConnection(incomingConn) {
            const remotePeerId = incomingConn.peer;
            const contact = contacts.find(c => c.peerId === remotePeerId);
            
            if (!contact) {
                incomingConn.close();
                addSystemMessageToActive('Tanınmayan bağlantı isteği reddedildi.');
                return;
            }
            
            if (currentConnection) currentConnection.close();
            currentConnection = incomingConn;
            activeContactId = contact.id;
            activeContactPeerId = contact.peerId;
            activeContactName = contact.name;
            activeContactNameSpan.textContent = contact.name;
            renderMessagesForActiveContact();
            setupConnectionEvents(currentConnection, contact.name);
            addSystemMessageToActive(`${contact.name} sizinle bağlantı kurdu.`);
            setConnectedState(true);
        }

        function setupConnectionEvents(connection, contactName) {
            connection.on('open', () => {
                setConnectedState(true);
                statusDiv.innerHTML = `✅ ${contactName} ile bağlantı aktif`;
                addSystemMessageToActive(`${contactName} ile görüşmeye hazırsınız.`);
                hideRetryBadge();
                if (reconnectTimer) clearTimeout(reconnectTimer);
            });
            
            connection.on('data', (data) => {
                if (data && data.text && activeContactId) {
                    addMessageToUIAndHistory(activeContactId, data.text, contactName, false);
                }
            });
            
            connection.on('close', () => {
                if (currentConnection === connection) {
                    addSystemMessageToActive(`${contactName} bağlantıyı kapattı.`);
                    setConnectedState(false);
                    currentConnection = null;
                    scheduleReconnect();
                }
            });
            
            connection.on('error', (err) => {
                if (currentConnection === connection) {
                    addSystemMessageToActive(`${contactName} bağlantı hatası`);
                    setConnectedState(false);
                    currentConnection = null;
                    scheduleReconnect();
                }
            });
        }

        function scheduleReconnect() {
            if (!activeContactId || isManualDisconnect) return;
            if (reconnectTimer) clearTimeout(reconnectTimer);
            showRetryBadge();
            reconnectTimer = setTimeout(() => {
                if (!isConnected && activeContactId) {
                    const contact = contacts.find(c => c.id === activeContactId);
                    if (contact) {
                        addSystemMessageToActive(`${contact.name} için yeniden bağlanılıyor...`);
                        initiateConnectionToPeer(contact.peerId, contact.name);
                    }
                }
                hideRetryBadge();
            }, 3000);
        }

        function initiateConnectionToPeer(peerId, contactName) {
            if (!peer) return;
            if (currentConnection) currentConnection.close();
            isManualDisconnect = false;
            statusDiv.innerHTML = `🔄 ${contactName} bağlanıyor...`;
            const newConn = peer.connect(peerId);
            if (!newConn) return;
            currentConnection = newConn;
            setupConnectionEvents(currentConnection, contactName);
            
            setTimeout(() => {
                if (currentConnection === newConn && !isConnected) {
                    addSystemMessageToActive(`${contactName} bağlantı zaman aşımı`);
                    setConnectedState(false);
                    if (currentConnection === newConn) currentConnection = null;
                    scheduleReconnect();
                }
            }, 10000);
        }

        function setConnectedState(connected) {
            isConnected = connected;
            messageInput.disabled = !connected;
            sendButton.disabled = !connected;
            if (!connected) {
                statusDiv.innerHTML = '❌ Bağlantı kesildi, otomatik yeniden bağlanılıyor...';
            }
        }

        function showRetryBadge() { if (connectionRetryBadge) connectionRetryBadge.style.display = 'inline-block'; }
        function hideRetryBadge() { if (connectionRetryBadge) connectionRetryBadge.style.display = 'none'; }

        function sendMessageToActive() {
            if (!isConnected || !currentConnection || !activeContactId) {
                addSystemMessageToActive('Önce bir kişi seçip bağlanın.');
                return;
            }
            const text = messageInput.value.trim();
            if (!text) return;
            const payload = { text: text, sender: activeContactName, timestamp: Date.now() };
            currentConnection.send(payload);
            addMessageToUIAndHistory(activeContactId, text, 'Ben', true);
            messageInput.value = '';
            messageInput.focus();
        }

        // Veri yönetimi
        function loadContacts() {
            const stored = localStorage.getItem('p2p_contacts_v2');
            if (stored) { try { contacts = JSON.parse(stored); } catch(e) { contacts = []; } }
            else { contacts = []; }
            renderContactsList();
        }
        function saveContacts() { localStorage.setItem('p2p_contacts_v2', JSON.stringify(contacts)); }
        
        function loadMessagesHistory() {
            const storedMsg = localStorage.getItem('p2p_messages_history_v2');
            if (storedMsg) { try { messagesHistory = JSON.parse(storedMsg); } catch(e) { messagesHistory = {}; } }
            else { messagesHistory = {}; }
        }
        function saveMessagesHistory() { localStorage.setItem('p2p_messages_history_v2', JSON.stringify(messagesHistory)); }

        function addMessageToUIAndHistory(contactId, text, senderName, isSent) {
            if (!messagesHistory[contactId]) messagesHistory[contactId] = [];
            messagesHistory[contactId].push({ text, senderName, timestamp: Date.now(), isSent });
            saveMessagesHistory();
            if (activeContactId === contactId) renderMessagesForActiveContact();
        }

        function addSystemMessageToActive(text) {
            if (!activeContactId) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message received';
            msgDiv.style.alignSelf = 'center';
            msgDiv.style.maxWidth = '85%';
            msgDiv.innerHTML = `<div class="message-content" style="background:#eef2ff; color:#334155; font-size:0.7rem; padding:5px 10px;">📡 ${escapeHtml(text)}</div>`;
            messagesArea.appendChild(msgDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function renderMessagesForActiveContact() {
            messagesArea.innerHTML = '';
            if (!activeContactId) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'message received';
                emptyDiv.style.alignSelf = 'center';
                emptyDiv.innerHTML = `<div class="message-content" style="background:#e2e8f0;">👈 Kişi seçin</div>`;
                messagesArea.appendChild(emptyDiv);
                return;
            }
            const history = messagesHistory[activeContactId] || [];
            history.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.isSent ? 'sent' : 'received'}`;
                const timeStr = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
                msgDiv.innerHTML = `
                    <div class="message-content">
                        ${!msg.isSent ? `<strong>${escapeHtml(msg.senderName || activeContactName)}:</strong> ` : ''}
                        ${escapeHtml(msg.text)}
                    </div>
                    <div class="message-time">${timeStr}</div>
                `;
                messagesArea.appendChild(msgDiv);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function renderContactsList() {
            if (!contactsListDiv) return;
            if (contacts.length === 0) {
                contactsListDiv.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:10px;">📭 Henüz kişi yok, + ile ekleyin</div>';
                return;
            }
            contactsListDiv.innerHTML = '';
            contacts.forEach(contact => {
                const contactDiv = document.createElement('div');
                contactDiv.className = 'contact-item';
                contactDiv.innerHTML = `
                    <div class="contact-info">
                        <div class="contact-name">${escapeHtml(contact.name)}</div>
                        <div class="contact-peerid">${escapeHtml(contact.peerId.substring(0, 16))}...</div>
                    </div>
                    <div class="contact-actions">
                        <button class="connect-contact-btn" data-id="${contact.id}" data-peer="${contact.peerId}" data-name="${escapeHtml(contact.name)}">🔗 Bağlan</button>
                        <button class="delete-contact-btn" data-id="${contact.id}">🗑</button>
                    </div>
                `;
                contactsListDiv.appendChild(contactDiv);
            });
            document.querySelectorAll('.connect-contact-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.dataset.id, peerId = btn.dataset.peer, name = btn.dataset.name;
                    selectAndConnectToContact(id, peerId, name);
                });
            });
            document.querySelectorAll('.delete-contact-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.dataset.id;
                    deleteContactById(id);
                });
            });
        }

        function selectAndConnectToContact(contactId, peerId, name) {
            activeContactId = contactId;
            activeContactPeerId = peerId;
            activeContactName = name;
            activeContactNameSpan.innerText = name;
            renderMessagesForActiveContact();
            if (currentConnection) { currentConnection.close(); currentConnection = null; isConnected = false; setConnectedState(false); }
            isManualDisconnect = false;
            initiateConnectionToPeer(peerId, name);
        }

        function deleteContactById(contactId) {
            if (confirm('Kişiyi silmek mesaj geçmişini de siler. Devam?')) {
                contacts = contacts.filter(c => c.id !== contactId);
                saveContacts();
                if (messagesHistory[contactId]) delete messagesHistory[contactId];
                saveMessagesHistory();
                if (activeContactId === contactId) {
                    activeContactId = null;
                    activeContactName = "";
                    activeContactNameSpan.innerText = "Seçili kişi yok";
                    if (currentConnection) { currentConnection.close(); currentConnection = null; isConnected = false; setConnectedState(false); }
                    renderMessagesForActiveContact();
                }
                renderContactsList();
            }
        }

        // Tüm verileri silme
        function clearAllData() {
            const confirmDiv = document.createElement('div');
            confirmDiv.className = 'confirm-modal';
            confirmDiv.innerHTML = `
                <div class="confirm-content">
                    <p>⚠️ Tüm kişiler ve mesaj geçmişi silinecek. Bu işlem geri alınamaz. Devam et?</p>
                    <div class="confirm-buttons">
                        <button class="confirm-yes">Evet, Sil</button>
                        <button class="confirm-no">İptal</button>
                    </div>
                </div>
            `;
            document.body.appendChild(confirmDiv);
            
            const yesBtn = confirmDiv.querySelector('.confirm-yes');
            const noBtn = confirmDiv.querySelector('.confirm-no');
            
            yesBtn.onclick = () => {
                // Tüm verileri temizle
                localStorage.removeItem('p2p_contacts_v2');
                localStorage.removeItem('p2p_messages_history_v2');
                localStorage.removeItem('p2p_my_permanent_id');
                contacts = [];
                messagesHistory = {};
                if (currentConnection) { currentConnection.close(); currentConnection = null; }
                activeContactId = null;
                activeContactName = "";
                activeContactNameSpan.innerText = "Seçili kişi yok";
                setConnectedState(false);
                renderContactsList();
                renderMessagesForActiveContact();
                statusDiv.innerHTML = '✅ Tüm veriler silindi. Sayfa yenileniyor...';
                setTimeout(() => { location.reload(); }, 1500);
                confirmDiv.remove();
            };
            noBtn.onclick = () => { confirmDiv.remove(); };
        }

        // Modal
        function showModal() { contactNameInput.value = ''; contactPeerIdInput.value = ''; modal.style.display = 'flex'; }
        function hideModal() { modal.style.display = 'none'; }
        function saveNewContact() {
            const name = contactNameInput.value.trim();
            const peerId = contactPeerIdInput.value.trim();
            if (!name || !peerId) { alert('Lütfen ad ve ID girin'); return; }
            if (contacts.some(c => c.peerId === peerId)) { alert('Bu ID zaten mevcut'); return; }
            const newId = Date.now().toString() + '_' + Math.random().toString(36);
            contacts.push({ id: newId, name: name, peerId: peerId });
            saveContacts();
            renderContactsList();
            hideModal();
        }

        function copyMyId() {
            if (myPermanentId) {
                navigator.clipboard.writeText(myPermanentId).then(() => {
                    const original = copyIdBtn.textContent;
                    copyIdBtn.textContent = '✅ Kopyalandı!';
                    setTimeout(() => { copyIdBtn.textContent = original; }, 1500);
                });
            }
        }

        // Eventler
        addContactBtn.addEventListener('click', showModal);
        clearAllBtn.addEventListener('click', clearAllData);
        modalCancelBtn.addEventListener('click', hideModal);
        modalSaveBtn.addEventListener('click', saveNewContact);
        sendButton.addEventListener('click', sendMessageToActive);
        copyIdBtn.addEventListener('click', copyMyId);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && isConnected && activeContactId) sendMessageToActive(); });
        window.addEventListener('click', (e) => { if (e.target === modal) hideModal(); });

        // Başlat
        loadContacts();
        loadMessagesHistory();
        initPeerWithPermanentId();
        activeContactId = null;
        renderMessagesForActiveContact();
    </script>
</body>
</html>
